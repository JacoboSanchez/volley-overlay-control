repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        pass_filenames: false
        additional_dependencies:
          - fastapi
          - pydantic
          - httpx
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-q", "-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^app/
        exclude: ^tests/
  - repo: local
    hooks:
      - id: frontend-prettier
        name: frontend prettier
        entry: bash -c 'cd frontend && npm run format:check'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
      - id: frontend-eslint
        name: frontend eslint
        # Run from inside frontend/ so ESLint resolves the local config
        # and plugins. The changed files arrive as repo-root paths
        # (frontend/src/foo.tsx); strip the leading "frontend/" before
        # invoking ESLint so it sees its own working-directory paths.
        entry: bash -c 'paths=(); for f in "$@"; do paths+=("${f#frontend/}"); done; cd frontend && npx eslint "${paths[@]}"' --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: true
