<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Glassmorphism</title>
<style>
  :root {
    --text: #f0f6ff;
    --muted: rgba(240, 246, 255, 0.65);
    --home: #ff4d6d;
    --away: #ffc857;
    --accent: #5bdb7c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background:
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="30" r="14" fill="%23ffffff" opacity="0.12"/><circle cx="70" cy="20" r="9" fill="%23ffffff" opacity="0.08"/><circle cx="60" cy="80" r="20" fill="%23ffffff" opacity="0.06"/></svg>'),
      linear-gradient(135deg, #2e7d32 0%, #1b5e20 35%, #f57c00 70%, #e65100 100%);
    background-blend-mode: overlay, normal;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    display: grid; place-items: center;
  }
  .preview-label {
    position: fixed; top: 12px; left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 0.04em;
    z-index: 10;
  }
  .overlay {
    width: 1280px; height: 720px;
    /* transparent over the stream — only the coloured blobs remain as accent */
    position: relative;
    overflow: hidden;
    padding: 36px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    gap: 18px;
  }
  /* organic blobs for depth */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
  }
  .blob.b1 { background: var(--home); width: 360px; height: 360px; top: -80px; left: -80px; }
  .blob.b2 { background: var(--away); width: 320px; height: 320px; top: -60px; right: -50px; }
  .blob.b3 { background: var(--accent); width: 280px; height: 280px; bottom: -100px; left: 35%; opacity: 0.4; }
  /* shared glass tile */
  .glass {
    position: relative;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 22px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      0 24px 50px rgba(0, 0, 0, 0.45);
    z-index: 1;
  }
  /* ── Header tile ──────────────────────────────────── */
  .header {
    grid-column: 1 / -1;
    padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header .title {
    display: flex; align-items: center; gap: 16px;
    font: 700 16px/1 -apple-system, sans-serif;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .header .title .pill {
    padding: 6px 14px;
    background: rgba(91, 219, 124, 0.2);
    border: 1px solid rgba(91, 219, 124, 0.5);
    color: var(--accent);
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.22em;
  }
  .header .meta {
    display: flex; gap: 24px;
    font: 600 14px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .header .meta strong { color: var(--text); }
  /* ── Score tile (big, left) ───────────────────────── */
  .score-tile {
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 16px;
  }
  .score-tile .teams {
    display: flex; flex-direction: column; gap: 16px;
  }
  .team-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 18px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .team-row:last-child { border-bottom: none; }
  .team-row .logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: grid; place-items: center;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    font: 800 22px/1 -apple-system, sans-serif;
  }
  .team-row .name {
    font: 700 26px/1.1 -apple-system, sans-serif;
    letter-spacing: -0.01em;
  }
  .team-row .name .tag {
    display: block;
    font: 600 11px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .team-row.home .name strong { color: var(--home); font-weight: 800; }
  .team-row.away .name strong { color: var(--away); font-weight: 800; }
  .team-row .pts {
    font: 900 100px/0.85 'Inter', -apple-system, sans-serif;
    letter-spacing: -0.05em;
    color: #fff;
    text-shadow: 0 4px 18px rgba(0,0,0,0.4);
  }
  .team-row.home .pts { color: var(--home); }
  .team-row.away .pts { color: var(--away); }
  /* ── Chart tile (right) ───────────────────────────── */
  .chart-tile {
    padding: 24px 28px;
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .chart-tile .head {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .chart-tile .head .label {
    font: 700 12px/1 -apple-system, sans-serif;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .chart-tile .head .duration {
    font: 800 28px/1 'Inter', -apple-system, sans-serif;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .chart-tile .chart-box {
    flex: 1;
    position: relative;
  }
  .chart-tile svg { width: 100%; height: 100%; }
  .line-home {
    stroke: var(--home);
    stroke-width: 3;
    fill: none;
    filter: drop-shadow(0 0 10px rgba(255, 77, 109, 0.6));
  }
  .line-away {
    stroke: var(--away);
    stroke-width: 3;
    fill: none;
    filter: drop-shadow(0 0 10px rgba(255, 200, 87, 0.55));
  }
  .grid-glass { stroke: rgba(255,255,255,0.1); stroke-width: 1; stroke-dasharray: 2 4; }
  /* ── Footer stat tiles ────────────────────────────── */
  .footer-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .stat-tile {
    padding: 14px 18px;
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .stat-tile .label {
    font: 700 10px/1 -apple-system, sans-serif;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat-tile .value {
    font: 800 30px/1 'Inter', -apple-system, sans-serif;
    letter-spacing: -0.02em;
    display: flex; align-items: baseline; gap: 6px;
  }
  .stat-tile .value small {
    font-size: 0.55em;
    color: var(--muted);
    font-weight: 600;
  }
  .stat-tile.streak .value { color: var(--home); }
  .stat-tile .icon {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 20px;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="preview-label">glass.html · 1280 × 720 · Glassmorphism</div>
<div class="overlay">
  <span class="blob b1"></span>
  <span class="blob b2"></span>
  <span class="blob b3"></span>

  <div class="glass header">
    <div class="title">
      <span class="pill">Set 2 · Final</span>
      <span>Set recap</span>
    </div>
    <div class="meta">
      <span>Match <strong>1 – 1</strong></span>
      <span>4:32 elapsed</span>
    </div>
  </div>

  <div class="glass score-tile">
    <div class="teams">
      <div class="team-row home">
        <div class="logo">TW</div>
        <div class="name"><strong>Thunder Wolves</strong><span class="tag">Home</span></div>
        <div class="pts">25</div>
      </div>
      <div class="team-row away">
        <div class="logo">SH</div>
        <div class="name"><strong>Solar Hawks</strong><span class="tag">Away</span></div>
        <div class="pts">22</div>
      </div>
    </div>
  </div>

  <div class="glass chart-tile">
    <div class="head">
      <span class="label">Progression</span>
      <span class="duration">4:32</span>
    </div>
    <div class="chart-box">
      <svg viewBox="0 0 480 360" preserveAspectRatio="none">
        <line class="grid-glass" x1="0" y1="354" x2="480" y2="354" />
        <line class="grid-glass" x1="0" y1="180" x2="480" y2="180" />
        <line class="grid-glass" x1="0" y1="6"   x2="480" y2="6"   />
        <polyline class="line-home" points="
          12,340 22,340 32,326 42,312 52,312 62,298 72,298 82,298 93,284 103,270 113,270 123,270
          133,256 143,256 153,242 163,242 174,228 184,228 194,214 204,214 214,199 224,199 234,185 244,185
          254,171 265,157 275,143 285,129 295,115 305,101
          315,101 325,101 335,101 346,87 356,87 366,73 376,73 386,58 396,58 406,44 416,44 427,30 437,30 447,30 457,30 468,16 480,8
        "/>
        <polyline class="line-away" points="
          12,354 22,340 32,340 42,340 52,326 62,326 72,312 82,298 93,298 103,298 113,284 123,270
          133,270 143,256 153,256 163,242 174,242 184,228 194,228 204,214 214,214 224,199 234,199 244,185
          254,185 265,185 275,185 285,185 295,185 305,185
          315,171 325,157 335,143 346,143 356,129 366,129 376,115 386,115 396,101 406,101 416,87 427,73 437,73 447,73 457,58 468,44 480,30
        "/>
      </svg>
    </div>
  </div>

  <div class="footer-row">
    <div class="glass stat-tile streak">
      <span class="icon">🔥</span>
      <span class="label">Longest streak</span>
      <span class="value">6 <small>· TW 12→18</small></span>
    </div>
    <div class="glass stat-tile">
      <span class="icon">🏐</span>
      <span class="label">Services won</span>
      <span class="value">8 <small>/ 6</small></span>
    </div>
    <div class="glass stat-tile">
      <span class="icon">⏱</span>
      <span class="label">Timeouts used</span>
      <span class="value">0 <small>· 2</small></span>
    </div>
    <div class="glass stat-tile">
      <span class="icon">∑</span>
      <span class="label">Total points</span>
      <span class="value">47</span>
    </div>
  </div>
</div>
</body>
</html>
