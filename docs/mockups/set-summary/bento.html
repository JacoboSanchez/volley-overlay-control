<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Bento dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --tile: #161b22;
    --tile-2: #1c2330;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: rgba(255,255,255,0.08);
    --home: #ff5a73;
    --away: #ffb541;
    --accent: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background:
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="30" r="14" fill="%23ffffff" opacity="0.12"/><circle cx="70" cy="20" r="9" fill="%23ffffff" opacity="0.08"/><circle cx="60" cy="80" r="20" fill="%23ffffff" opacity="0.06"/></svg>'),
      linear-gradient(135deg, #2e7d32 0%, #1b5e20 35%, #f57c00 70%, #e65100 100%);
    background-blend-mode: overlay, normal;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid; place-items: center;
  }
  .preview-label {
    position: fixed; top: 12px; left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 0.04em;
  }
  .overlay {
    width: 1280px; height: 720px;
    padding: 36px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: auto repeat(3, 1fr);
    gap: 18px;
  }
  .header {
    grid-column: 1 / -1;
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 6px;
  }
  .header .title {
    font: 800 32px/1 -apple-system, sans-serif;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.65);
  }
  .header .title span { color: var(--muted); font-weight: 400; }
  .header .duration {
    font: 700 26px/1 'Menlo', 'Consolas', monospace;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.65);
  }
  .tile {
    background: rgba(22, 27, 34, 0.62);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    position: relative;
  }
  .tile .label {
    font: 700 11px/1 -apple-system, sans-serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tile .value {
    font: 800 50px/1 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.02em;
  }
  .tile .sub {
    font: 500 13px/1.3 -apple-system, sans-serif;
    color: var(--muted);
  }
  /* Score tile - dominant */
  .tile.score {
    grid-column: 1 / span 4;
    grid-row: 2 / span 2;
    background:
      linear-gradient(135deg, rgba(255,90,115,0.30) 0%, rgba(255,181,65,0.30) 100%),
      rgba(15, 20, 30, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.16);
    padding: 28px 32px;
  }
  .tile.score .teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    flex: 1;
  }
  .tile.score .team { display: flex; flex-direction: column; gap: 4px; }
  .tile.score .team.away { align-items: flex-end; }
  .tile.score .team .name {
    font: 700 18px/1 -apple-system, sans-serif;
    letter-spacing: 0.06em;
  }
  .tile.score .team.home .name { color: var(--home); }
  .tile.score .team.away .name { color: var(--away); }
  .tile.score .team .score {
    font: 900 180px/0.85 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.06em;
    text-shadow: 0 6px 24px rgba(0,0,0,0.5);
  }
  .tile.score .sep {
    font: 800 80px/1 'Menlo', monospace;
    color: var(--muted);
    opacity: 0.4;
  }
  /* Chart tile */
  .tile.chart {
    grid-column: 5 / span 2;
    grid-row: 2 / span 2;
  }
  .tile.chart .label { margin-bottom: 8px; }
  .tile.chart svg { width: 100%; flex: 1; }
  .line-home { stroke: var(--home); stroke-width: 2.5; fill: none; }
  .line-away { stroke: var(--away); stroke-width: 2.5; fill: none; }
  .grid-tile { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
  /* Stat tiles bottom row */
  .tile.stat-streak { grid-column: 1 / span 2; }
  .tile.stat-streak .value { color: var(--home); }
  .tile.stat-services { grid-column: 3 / span 2; }
  .tile.stat-timeouts { grid-column: 5 / span 1; }
  .tile.stat-timeouts .value { font-size: 36px; }
  .tile.stat-total { grid-column: 6 / span 1; }
  .tile.stat-total .value { font-size: 36px; }
  .icon {
    position: absolute;
    top: 18px;
    right: 22px;
    font-size: 22px;
    opacity: 0.4;
  }
</style>
</head>
<body>
<div class="preview-label">bento.html · 1280 × 720 · Bento dashboard</div>
<div class="overlay">
  <div class="header">
    <div class="title">Set 2 · <span>recap</span></div>
    <div class="duration">4:32</div>
  </div>

  <div class="tile score">
    <div class="label">Final score</div>
    <div class="teams">
      <div class="team home">
        <span class="name">Thunder Wolves</span>
        <span class="score">25</span>
      </div>
      <span class="sep">—</span>
      <div class="team away">
        <span class="name">Solar Hawks</span>
        <span class="score">22</span>
      </div>
    </div>
  </div>

  <div class="tile chart">
    <div class="label">Point progression</div>
    <svg viewBox="0 0 280 240" preserveAspectRatio="none">
      <line class="grid-tile" x1="0" y1="236" x2="280" y2="236" />
      <line class="grid-tile" x1="0" y1="120" x2="280" y2="120" />
      <line class="grid-tile" x1="0" y1="4"   x2="280" y2="4"   />
      <polyline class="line-home" points="
        8,229 16,229 24,219 31,210 39,210 47,201 55,201 62,201 70,191 78,182 86,182 93,182
        101,172 109,172 117,163 125,163 132,153 140,153 148,144 156,144 163,134 171,134 179,125 187,125
        194,115 202,106 210,96 218,87 225,77 233,68
        241,68 249,68 256,68 264,58 272,58 280,48
      "/>
      <polyline class="line-away" points="
        8,236 16,229 24,229 31,229 39,219 47,219 55,210 62,201 70,201 78,201 86,191 93,182
        101,182 109,172 117,172 125,163 132,163 140,153 148,153 156,144 163,144 171,134 179,134 187,125
        194,125 202,125 210,125 218,125 225,125 233,125
        241,115 249,106 256,96 264,96 272,87 280,77
      "/>
    </svg>
  </div>

  <div class="tile stat-streak">
    <span class="icon">🔥</span>
    <div>
      <div class="label">Longest streak</div>
    </div>
    <div>
      <div class="value">6</div>
      <div class="sub">Thunder Wolves · 12 → 18</div>
    </div>
  </div>
  <div class="tile stat-services">
    <span class="icon">🏐</span>
    <div class="label">Services won</div>
    <div>
      <div class="value">8<span style="color:var(--muted);font-size:0.6em;"> / 6</span></div>
      <div class="sub">Home / Away</div>
    </div>
  </div>
  <div class="tile stat-timeouts">
    <span class="icon">⏱</span>
    <div class="label">T-outs</div>
    <div>
      <div class="value">0·2</div>
      <div class="sub">used</div>
    </div>
  </div>
  <div class="tile stat-total">
    <div class="label">Points</div>
    <div>
      <div class="value">47</div>
      <div class="sub">total</div>
    </div>
  </div>
</div>
</body>
</html>
