<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Hero score + chart de fondo</title>
<style>
  :root {
    --bg: #0d1117;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: rgba(255, 255, 255, 0.08);
    --home: #d4314c;
    --away: #f0a020;
    --accent: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid;
    place-items: center;
  }
  .preview-label {
    position: fixed;
    top: 12px;
    left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .overlay {
    position: relative;
    width: 1100px;
    height: 340px;
    background:
      radial-gradient(ellipse at top left, rgba(212, 49, 76, 0.22) 0%, transparent 55%),
      radial-gradient(ellipse at top right, rgba(240, 160, 32, 0.22) 0%, transparent 55%),
      linear-gradient(180deg, #11151c 0%, #0d1117 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
  }
  /* ── Watermark chart ──────────────────────────────── */
  .chart-bg {
    position: absolute;
    inset: 60px 0 90px 0;
    width: 100%;
    opacity: 0.25;
  }
  .chart-bg svg { width: 100%; height: 100%; display: block; }
  .line-home { stroke: var(--home); stroke-width: 3.5; fill: none; }
  .line-away { stroke: var(--away); stroke-width: 3.5; fill: none; }

  /* ── Hero score ───────────────────────────────────── */
  .hero {
    position: relative;
    z-index: 1;
    padding: 28px 60px 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
  }
  .team {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .team.home { align-items: flex-start; text-align: left; }
  .team.away { align-items: flex-end; text-align: right; }
  .team-name {
    font: 700 16px/1 -apple-system, sans-serif;
    color: var(--text);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .team.home .team-name { color: var(--home); }
  .team.away .team-name { color: var(--away); }
  .team-score {
    font: 900 140px/0.9 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.06em;
    text-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
  }
  .score-divider {
    font: 700 56px/1 'Menlo', monospace;
    color: var(--muted);
    opacity: 0.55;
    padding-bottom: 14px;
  }

  /* ── Footer stats ─────────────────────────────────── */
  .footer {
    position: absolute;
    inset: auto 0 0 0;
    height: 76px;
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    background: rgba(13, 17, 23, 0.7);
    backdrop-filter: blur(8px);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 28px;
  }
  .footer .set-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(46, 204, 113, 0.15);
    border: 1px solid rgba(46, 204, 113, 0.4);
    font: 700 13px/1 -apple-system, sans-serif;
    letter-spacing: 0.16em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .footer .set-pill .clock {
    font-family: 'Menlo', 'Consolas', monospace;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .footer .stats {
    display: flex;
    justify-content: center;
    gap: 36px;
  }
  .footer .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .footer .stat .label {
    font: 600 10px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .footer .stat .value {
    font: 700 18px/1 'Menlo', 'Consolas', monospace;
    color: var(--text);
  }
  .footer .stat .value.home { color: var(--home); }
  .footer .stat .value.away { color: var(--away); }
  .footer .live-tag {
    font: 700 11px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="preview-label">hero.html · 1100 × 340 · Hero score + chart de fondo</div>

<div class="overlay">
  <!-- watermark chart -->
  <div class="chart-bg">
    <svg viewBox="0 0 1100 190" preserveAspectRatio="none">
      <polyline class="line-home" points="
        25,180 50,180 75,172 100,165 125,165 150,157 175,157 200,157 225,150 250,142 275,142 300,142
        325,135 350,135 375,127 400,127 425,120 450,120 475,112 500,112 525,105 550,105 575,97 600,97
        625,90 650,82 675,75 700,67 725,60 750,52
        775,52 800,52 825,52 850,45 875,45 900,37 925,37 950,30 975,30 1000,22 1025,22 1050,15 1075,15 1100,7
      "/>
      <polyline class="line-away" points="
        25,187 50,180 75,180 100,180 125,172 150,172 175,165 200,157 225,157 250,157 275,150 300,142
        325,142 350,135 375,135 400,127 425,127 450,120 475,120 500,112 525,112 550,105 575,105 600,97
        625,97 650,97 675,97 700,97 725,97 750,97
        775,90 800,82 825,75 850,75 875,67 900,67 925,60 950,60 975,52 1000,52 1025,45 1050,37 1075,37 1100,30
      "/>
    </svg>
  </div>

  <!-- Hero score -->
  <div class="hero">
    <div class="team home">
      <span class="team-name">Thunder Wolves</span>
      <span class="team-score">25</span>
    </div>
    <span class="score-divider">—</span>
    <div class="team away">
      <span class="team-name">Solar Hawks</span>
      <span class="team-score">22</span>
    </div>
  </div>

  <!-- Footer stats -->
  <div class="footer">
    <span class="set-pill">
      Set 2 · Final
      <span class="clock">4:32</span>
    </span>
    <div class="stats">
      <div class="stat">
        <span class="label">Longest streak</span>
        <span class="value home">6</span>
      </div>
      <div class="stat">
        <span class="label">Services won</span>
        <span class="value">8 / 6</span>
      </div>
      <div class="stat">
        <span class="label">Timeouts</span>
        <span class="value">0 · 2</span>
      </div>
      <div class="stat">
        <span class="label">Total points</span>
        <span class="value">47</span>
      </div>
    </div>
    <span class="live-tag">Set recap</span>
  </div>
</div>
</body>
</html>
