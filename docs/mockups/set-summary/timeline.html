<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Timeline storyboard</title>
<style>
  :root {
    --bg: #0d1117;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: rgba(255, 255, 255, 0.08);
    --grid: rgba(255, 255, 255, 0.12);
    --home: #d4314c;
    --away: #f0a020;
    --accent: #2ecc71;
    --warn: #f5c542;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid;
    place-items: center;
  }
  .preview-label {
    position: fixed;
    top: 12px;
    left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .overlay {
    width: 1100px;
    height: 340px;
    background: linear-gradient(180deg, #11151c 0%, #0d1117 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 24px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    row-gap: 12px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
  }

  /* ── Top pill ─────────────────────────────────────── */
  .top-pill {
    display: flex;
    justify-content: center;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 8px 22px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    font: 700 14px/1 -apple-system, sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .pill .home-score { color: var(--home); font-family: 'Menlo', monospace; font-size: 17px; letter-spacing: 0; }
  .pill .away-score { color: var(--away); font-family: 'Menlo', monospace; font-size: 17px; letter-spacing: 0; }
  .pill .dash { color: var(--muted); }
  .pill .duration { color: var(--accent); font-family: 'Menlo', monospace; letter-spacing: 0.04em; font-size: 13px; }
  .pill .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--muted);
    display: inline-block;
  }

  /* ── Chart (full width hero) ──────────────────────── */
  .chart {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .chart svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .chart-grid { stroke: var(--grid); stroke-width: 1; }
  .chart-grid-faint { stroke: var(--grid); stroke-width: 1; stroke-dasharray: 2 4; }
  .line-home { stroke: var(--home); stroke-width: 2.5; fill: none; filter: drop-shadow(0 0 6px rgba(212, 49, 76, 0.4)); }
  .line-away { stroke: var(--away); stroke-width: 2.5; fill: none; filter: drop-shadow(0 0 6px rgba(240, 160, 32, 0.4)); }
  .dot-home { fill: var(--home); }
  .dot-away { fill: var(--away); }
  .y-axis-label { fill: var(--muted); font: 10px 'Menlo', monospace; }

  /* ── Bottom band: events ──────────────────────────── */
  .events {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
    overflow: hidden;
    justify-content: center;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .event {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    font: 600 11px/1 -apple-system, sans-serif;
    color: var(--text);
    white-space: nowrap;
  }
  .event .icon { font-size: 13px; }
  .event .label { color: var(--muted); font-weight: 500; }
  .event .at {
    font: 700 11px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    padding-left: 4px;
    border-left: 1px solid var(--border);
    margin-left: 2px;
  }
  .event.streak-home { border-color: rgba(212, 49, 76, 0.35); background: rgba(212, 49, 76, 0.08); }
  .event.streak-away { border-color: rgba(240, 160, 32, 0.35); background: rgba(240, 160, 32, 0.08); }
  .event.timeout { border-color: rgba(245, 197, 66, 0.35); background: rgba(245, 197, 66, 0.06); }
  .event.set-point { border-color: rgba(46, 204, 113, 0.4); background: rgba(46, 204, 113, 0.1); }
</style>
</head>
<body>
<div class="preview-label">timeline.html · 1100 × 340 · Timeline storyboard</div>

<div class="overlay">
  <!-- Top pill -->
  <div class="top-pill">
    <span class="pill">
      Set 2 · Final
      <span class="dot"></span>
      <span class="home-score">25</span>

      <span class="away-score">22</span>

  <!-- Full-width chart -->
  <div class="chart">

      <!-- baselines -->
      <line class="chart-grid" x1="28" y1="174" x2="1048" y2="174" />

      <line class="chart-grid-faint" x1="28" y1="14" x2="1048" y2="14" />

      <text class="y-axis-label" x="735" y="10" fill="#f5c542">T</text>
      <text class="y-axis-label" x="890" y="10" fill="#f5c542">T</text>
      <!-- home line (25 cumulative points across 47 events) -->
      <polyline class="line-home" points="
        50,168 71,168 92,161 113,154 134,154 155,148 176,148 197,148 218,141 240,134 261,134 282,134
        303,128 324,128 345,121 366,121 387,114 408,114 429,108 451,108 472,101 493,101 514,94 535,94
        556,88 577,81 598,74 619,67 640,61 661,54
        682,54 703,54 724,54 745,48 766,48 787,41 808,41 829,35 850,35 871,28 892,28 913,21 934,21 955,21 976,21 997,21 1018,21 1040,14
      "/>
      <!-- away line (22 cumulative points across 47 events) -->
      <polyline class="line-away" points="
        50,174 71,168 92,168 113,168 134,161 155,161 176,154 197,148 218,148 240,148 261,141 282,134
        303,134 324,128 345,128 366,121 387,121 408,114 429,114 451,108 472,108 493,101 514,101 535,94
        556,94 577,94 598,94 619,94 640,94 661,94
        682,88 703,81 724,74 745,74 766,67 787,67 808,61 829,61 850,54 871,54 892,48 913,41 934,41 955,41 976,35 997,28 1018,28 1040,28
      "/>
      <!-- markers at key events -->
      <circle class="dot-home" cx="640" cy="61" r="3.5" />
      <circle class="dot-home" cx="661" cy="54" r="3.5" />
      <circle class="dot-away" cx="745" cy="74" r="3.5" />
      <circle class="dot-away" cx="900" cy="48" r="3.5" />
      <circle class="dot-home" cx="1018" cy="21" r="4" />
      <circle class="dot-home" cx="1040" cy="14" r="4" stroke="#fff" stroke-width="1.5" />
    </svg>
  </div>

  <!-- Event chips band -->
  <div class="events">
    <span class="event streak-home">
      <span class="icon">🔥</span>
      <span class="label">6-streak Thunder Wolves</span>
      <span class="at">12–12 → 18–12</span>
    </span>
    <span class="event streak-away">
      <span class="icon">↗</span>
      <span class="label">3-streak Solar Hawks</span>
      <span class="at">18–12 → 18–15</span>
    </span>
    <span class="event timeout">
      <span class="icon">⏱</span>
      <span class="label">Timeout SH</span>
      <span class="at">18–15</span>
    </span>
    <span class="event timeout">
      <span class="icon">⏱</span>
      <span class="label">Timeout SH</span>
      <span class="at">22–19</span>
    </span>
    <span class="event set-point">
      <span class="icon">🎯</span>
      <span class="label">Set point</span>
      <span class="at">24–22</span>
    </span>
  </div>
</div>
</body>
</html>
