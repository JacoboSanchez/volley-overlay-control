<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Brand columns</title>
<style>
  :root {
    --bg: #0d1117;
    --text: #fff;
    --muted: rgba(255,255,255,0.7);
    --border: rgba(255,255,255,0.15);
    --home: #d4314c;
    --home-deep: #5a1322;
    --away: #f0a020;
    --away-deep: #6a4810;
    --accent: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background:
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="30" r="14" fill="%23ffffff" opacity="0.12"/><circle cx="70" cy="20" r="9" fill="%23ffffff" opacity="0.08"/><circle cx="60" cy="80" r="20" fill="%23ffffff" opacity="0.06"/></svg>'),
      linear-gradient(135deg, #2e7d32 0%, #1b5e20 35%, #f57c00 70%, #e65100 100%);
    background-blend-mode: overlay, normal;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid; place-items: center;
  }
  .preview-label {
    position: fixed; top: 12px; left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 0.04em;
    z-index: 10;
  }
  .overlay {
    width: 1280px; height: 720px;
    display: grid;
    grid-template-columns: 1fr 360px 1fr;
    position: relative;
  }
  /* ── Brand columns ────────────────────────────────── */
  .team-col {
    position: relative;
    padding: 56px 48px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .team-col.home {
    background:
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.06) 0%, transparent 60%),
      linear-gradient(135deg, rgba(212, 49, 76, 0.72) 0%, rgba(90, 19, 34, 0.72) 100%);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
  }
  .team-col.away {
    background:
      radial-gradient(circle at 80% 80%, rgba(255,255,255,0.06) 0%, transparent 60%),
      linear-gradient(225deg, rgba(240, 160, 32, 0.72) 0%, rgba(106, 72, 16, 0.72) 100%);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    text-align: right;
  }
  /* Sheen overlay */
  .team-col::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }
  .team-col > * { position: relative; z-index: 1; }
  .team-header {
    display: flex; align-items: center; gap: 20px;
  }
  .team-col.away .team-header { flex-direction: row-reverse; }
  .logo {
    width: 88px; height: 88px;
    border-radius: 16px;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.45);
    display: grid; place-items: center;
    font: 800 36px/1 -apple-system, sans-serif;
    letter-spacing: 0.02em;
  }
  .team-name {
    font: 800 42px/1.05 -apple-system, sans-serif;
    letter-spacing: -0.01em;
  }
  .team-tag {
    font: 600 14px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .team-score {
    font: 900 240px/0.82 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.06em;
    text-shadow: 0 8px 32px rgba(0,0,0,0.5);
    margin: 4px 0;
  }
  .team-stat-list {
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .team-col.away .team-stat-list { align-items: flex-end; }
  .team-stat {
    display: flex; flex-direction: column; gap: 2px;
  }
  .team-stat .label {
    font: 600 11px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .team-stat .value {
    font: 700 32px/1 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.02em;
  }
  /* ── Centre column ────────────────────────────────── */
  .centre {
    background: rgba(15, 20, 30, 0.62);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    padding: 56px 28px;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    row-gap: 16px;
    text-align: center;
    border-left: 1px solid rgba(255,255,255,0.12);
    border-right: 1px solid rgba(255,255,255,0.12);
  }
  .centre .set-pill {
    display: inline-flex; align-items: center; gap: 10px;
    align-self: center; justify-self: center;
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(46, 204, 113, 0.12);
    border: 1px solid rgba(46, 204, 113, 0.4);
    font: 700 12px/1 -apple-system, sans-serif;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .centre .set-pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .centre .chart-wrap {
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 8px 0;
  }
  .centre .chart-wrap svg { width: 100%; height: 100%; }
  .grid-faint { stroke: rgba(255,255,255,0.08); stroke-width: 1; stroke-dasharray: 2 3; }
  .grid-main  { stroke: rgba(255,255,255,0.14); stroke-width: 1; }
  .line-home { stroke: var(--home); stroke-width: 3; fill: none; }
  .line-away { stroke: var(--away); stroke-width: 3; fill: none; }
  .centre .vs {
    font: 800 28px/1 -apple-system, sans-serif;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.6em;
  }
  .centre .duration {
    display: flex; flex-direction: column; gap: 4px;
  }
  .centre .duration .label {
    font: 600 11px/1 -apple-system, sans-serif;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .centre .duration .value {
    font: 700 36px/1 'Menlo', 'Consolas', monospace;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="preview-label">brand-columns.html · 1280 × 720 · 3-column brand split</div>
<div class="overlay">
  <div class="team-col home">
    <div class="team-header">
      <div class="logo">TW</div>
      <div>
        <div class="team-name">Thunder<br>Wolves</div>
        <div class="team-tag">Home</div>
      </div>
    </div>
    <div class="team-score">25</div>
    <div class="team-stat-list">
      <div class="team-stat">
        <span class="label">Longest streak</span>
        <span class="value">6 points</span>
      </div>
      <div class="team-stat">
        <span class="label">Services won</span>
        <span class="value">8 / 15</span>
      </div>
    </div>
  </div>

  <div class="centre">
    <span class="set-pill">
      <span class="dot"></span>
      Set 2 · Final
    </span>
    <div class="chart-wrap">
      <svg viewBox="0 0 300 380" preserveAspectRatio="none">
        <line class="grid-main"  x1="0" y1="370" x2="300" y2="370" />
        <line class="grid-faint" x1="0" y1="190" x2="300" y2="190" />
        <line class="grid-faint" x1="0" y1="10"  x2="300" y2="10"  />
        <polyline class="line-home" points="
          6,358 12,358 18,344 24,331 31,331 37,317 43,317 49,317 56,303 62,290 68,290 74,290
          81,276 87,276 93,263 99,263 106,249 112,249 118,236 124,236 131,222 137,222 143,208 149,208
          156,195 162,181 168,168 174,154 180,140 187,127
          193,127 199,127 205,127 212,113 218,113 224,100 230,100 237,86 243,86 249,72 256,72 262,59 268,59 274,59 280,59 287,45 293,45 300,32
        "/>
        <polyline class="line-away" points="
          6,370 12,358 18,358 24,358 31,344 37,344 43,331 49,317 56,317 62,317 68,303 74,290
          81,290 87,276 93,276 99,263 106,263 112,249 118,249 124,236 131,236 137,222 143,222 149,208
          156,208 162,208 168,208 174,208 180,208 187,208
          193,195 199,181 205,168 212,168 218,154 224,154 230,140 237,140 243,127 249,127 256,113 262,100 268,100 274,100 280,86 287,72 293,72 300,59
        "/>
      </svg>
    </div>
    <div class="vs">VS</div>
    <div class="duration">
      <span class="label">Set duration</span>
      <span class="value">4:32</span>
    </div>
  </div>

  <div class="team-col away">
    <div class="team-header">
      <div class="logo">SH</div>
      <div>
        <div class="team-name">Solar<br>Hawks</div>
        <div class="team-tag">Away</div>
      </div>
    </div>
    <div class="team-score">22</div>
    <div class="team-stat-list">
      <div class="team-stat">
        <span class="label">Longest streak</span>
        <span class="value">3 points</span>
      </div>
      <div class="team-stat">
        <span class="label">Timeouts used</span>
        <span class="value">2 / 2</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
