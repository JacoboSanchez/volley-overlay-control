<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Split brand</title>
<style>
  :root {
    --bg: #0d1117;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: rgba(255, 255, 255, 0.08);
    --home: #d4314c;
    --home-deep: #7a1424;
    --away: #f0a020;
    --away-deep: #7a5210;
    --accent: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid;
    place-items: center;
  }
  .preview-label {
    position: fixed;
    top: 12px;
    left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .overlay {
    position: relative;
    width: 1100px;
    height: 340px;
    border-radius: 16px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    border: 1px solid var(--border);
  }

  /* ── Team panels (brand-tinted) ───────────────────── */
  .team-panel {
    position: relative;
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .team-panel.home {
    background: linear-gradient(135deg, var(--home) 0%, var(--home-deep) 100%);
  }
  .team-panel.away {
    background: linear-gradient(225deg, var(--away) 0%, var(--away-deep) 100%);
    text-align: right;
  }
  .team-panel::after {
    /* subtle diagonal sheen to soften */
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }
  .team-panel > * { position: relative; z-index: 1; }

  .team-header {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .team-panel.away .team-header { flex-direction: row-reverse; }
  .logo {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.15);
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    display: grid;
    place-items: center;
    font: 800 22px/1 -apple-system, sans-serif;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .team-name {
    font: 800 24px/1.1 -apple-system, sans-serif;
    color: #fff;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }
  .team-tag {
    font: 600 11px/1 -apple-system, sans-serif;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .team-score {
    font: 900 130px/0.85 'Menlo', 'Consolas', monospace;
    color: #fff;
    letter-spacing: -0.05em;
    text-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
    margin: 4px 0;
  }

  .team-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .team-panel.away .team-stat { align-items: flex-end; }
  .team-stat .label {
    font: 600 10px/1 -apple-system, sans-serif;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .team-stat .value {
    font: 700 22px/1 'Menlo', 'Consolas', monospace;
    color: #fff;
  }

  /* ── Center strip ─────────────────────────────────── */
  .center {
    width: 240px;
    background: linear-gradient(180deg, #11151c 0%, #0d1117 100%);
    border-left: 1px solid rgba(255,255,255,0.1);
    border-right: 1px solid rgba(255,255,255,0.1);
    padding: 18px 14px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    align-items: center;
    text-align: center;
  }
  .center .set-label {
    font: 700 12px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .center .set-label strong { color: var(--text); font-size: 14px; }
  .center .chart-mini {
    width: 100%;
    height: 100%;
    padding: 8px 0;
  }
  .center .chart-mini svg { width: 100%; height: 100%; }
  .line-home { stroke: var(--home); stroke-width: 2; fill: none; }
  .line-away { stroke: var(--away); stroke-width: 2; fill: none; }
  .grid { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
  .center .duration {
    font: 700 18px/1 'Menlo', 'Consolas', monospace;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .center .duration .label {
    display: block;
    font: 600 10px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<div class="preview-label">split.html · 1100 × 340 · Split brand</div>

<div class="overlay">
  <!-- Home -->
  <div class="team-panel home">
    <div class="team-header">
      <div class="logo">TW</div>
      <div>
        <div class="team-name">Thunder Wolves</div>
        <div class="team-tag">Home</div>
      </div>
    </div>
    <div class="team-score">25</div>
    <div class="team-stat">
      <span class="label">Longest streak</span>
      <span class="value">6 points</span>
    </div>
  </div>

  <!-- Center strip -->
  <div class="center">
    <div class="set-label">Set <strong>2</strong> · Final</div>
    <div class="chart-mini">
      <svg viewBox="0 0 200 140" preserveAspectRatio="none">
        <line class="grid" x1="0" y1="138" x2="200" y2="138" />
        <line class="grid" x1="0" y1="70"  x2="200" y2="70"  />
        <line class="grid" x1="0" y1="4"   x2="200" y2="4"   />
        <polyline class="line-home" points="
          4,134 12,134 19,128 27,123 35,123 42,118 50,118 58,118 65,112 73,107 81,107 88,107
          96,102 104,102 111,96 119,96 127,91 135,91 142,85 150,85 158,80 165,80 173,74 181,74
          188,68 196,63 200,57
        "/>
        <polyline class="line-away" points="
          4,138 12,134 19,134 27,134 35,128 42,128 50,123 58,118 65,118 73,118 81,112 88,107
          96,107 104,102 111,102 119,96 127,96 135,91 142,91 150,85 158,85 165,80 173,80 181,74
          188,74 196,74 200,74
        "/>
      </svg>
    </div>
    <div class="duration">
      <span class="label">Duration</span>
      4:32
    </div>
  </div>

  <!-- Away -->
  <div class="team-panel away">
    <div class="team-header">
      <div class="logo">SH</div>
      <div>
        <div class="team-name">Solar Hawks</div>
        <div class="team-tag">Away</div>
      </div>
    </div>
    <div class="team-score">22</div>
    <div class="team-stat">
      <span class="label">Services won</span>
      <span class="value">6 / 14</span>
    </div>
  </div>
</div>
</body>
</html>
