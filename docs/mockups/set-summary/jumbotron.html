<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Jumbotron LED</title>
<style>
  :root {
    --bg: #000;
    --led-on: #ffd64a;
    --led-dim: rgba(255, 214, 74, 0.18);
    --home: #ff4a5e;
    --home-dim: rgba(255, 74, 94, 0.18);
    --away: #4ad8ff;
    --away-dim: rgba(74, 216, 255, 0.18);
    --accent: #2ecc71;
    --muted: rgba(255,255,255,0.4);
    --text: #f0f6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0d12;
    color: var(--text);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: grid; place-items: center;
  }
  .preview-label {
    position: fixed; top: 12px; left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted); letter-spacing: 0.04em;
    z-index: 10;
  }
  .overlay {
    width: 1280px; height: 720px;
    background: var(--bg);
    border: 8px solid #14151a;
    box-shadow:
      inset 0 0 0 2px #2a2c33,
      0 24px 80px rgba(0,0,0,0.7);
    position: relative;
    overflow: hidden;
  }
  /* LED dot pattern overlay */
  .led-mask {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 1.5px 1.5px, rgba(0,0,0,0.65) 1.2px, transparent 1.4px);
    background-size: 3px 3px;
    pointer-events: none;
    z-index: 5;
    mix-blend-mode: multiply;
  }
  /* scanline */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.02) 0 1px,
      transparent 1px 3px);
    pointer-events: none;
    z-index: 6;
  }
  .content {
    position: relative;
    height: 100%;
    padding: 36px 56px 24px;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    row-gap: 18px;
  }
  /* ── Header ───────────────────────────────────────── */
  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 2px dashed rgba(255, 214, 74, 0.35);
    padding-bottom: 14px;
  }
  .header .corner-left, .header .corner-right {
    font: 800 18px/1 'Helvetica Neue', sans-serif;
    color: var(--led-on);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-shadow: 0 0 14px rgba(255, 214, 74, 0.6);
  }
  .header .corner-right { text-align: right; }
  .header .title {
    font: 900 26px/1 'Helvetica Neue', sans-serif;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: #fff;
    padding: 4px 24px;
    background: var(--led-on);
    color: #1a1a1a;
    border-radius: 4px;
  }
  /* ── Scoreboard ───────────────────────────────────── */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr 200px 1fr;
    align-items: center;
    gap: 16px;
  }
  .team-side {
    text-align: center;
    padding: 18px;
    border: 2px solid;
    border-radius: 6px;
    background: rgba(255,255,255,0.02);
  }
  .team-side.home {
    border-color: rgba(255, 74, 94, 0.4);
    box-shadow: inset 0 0 24px rgba(255, 74, 94, 0.12);
  }
  .team-side.away {
    border-color: rgba(74, 216, 255, 0.4);
    box-shadow: inset 0 0 24px rgba(74, 216, 255, 0.12);
  }
  .team-side .team-name {
    font: 900 22px/1 'Helvetica Neue', sans-serif;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .team-side.home .team-name { color: var(--home); text-shadow: 0 0 14px rgba(255,74,94,0.55); }
  .team-side.away .team-name { color: var(--away); text-shadow: 0 0 14px rgba(74,216,255,0.55); }
  .team-side .team-score {
    font: 900 220px/0.82 'Helvetica Neue', sans-serif;
    letter-spacing: -0.05em;
  }
  .team-side.home .team-score { color: var(--home); text-shadow: 0 0 22px rgba(255,74,94,0.5); }
  .team-side.away .team-score { color: var(--away); text-shadow: 0 0 22px rgba(74,216,255,0.5); }
  .centre-display {
    text-align: center;
    border: 2px solid rgba(255, 214, 74, 0.45);
    border-radius: 6px;
    padding: 16px 10px;
    background: rgba(255, 214, 74, 0.06);
    display: flex; flex-direction: column;
    gap: 6px;
    justify-content: center;
  }
  .centre-display .label {
    font: 900 12px/1 'Helvetica Neue', sans-serif;
    color: var(--led-on);
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .centre-display .set-num {
    font: 900 80px/0.85 'Helvetica Neue', sans-serif;
    color: var(--led-on);
    text-shadow: 0 0 20px rgba(255,214,74,0.65);
  }
  .centre-display .duration {
    font: 700 22px/1 'Menlo', 'Consolas', monospace;
    color: #fff;
    letter-spacing: 0.04em;
  }
  /* ── Chart ────────────────────────────────────────── */
  .chart-strip {
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 12px 18px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 18px;
    align-items: center;
  }
  .chart-strip .label {
    font: 900 12px/1 'Helvetica Neue', sans-serif;
    color: var(--led-on);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,214,74,0.4);
  }
  .chart-strip svg {
    width: 100%;
    height: 70px;
  }
  .grid-tick { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
  .line-home {
    stroke: var(--home);
    stroke-width: 3;
    fill: none;
    filter: drop-shadow(0 0 8px rgba(255,74,94,0.55));
  }
  .line-away {
    stroke: var(--away);
    stroke-width: 3;
    fill: none;
    filter: drop-shadow(0 0 8px rgba(74,216,255,0.55));
  }
  /* ── Marquee ──────────────────────────────────────── */
  .marquee {
    background: var(--led-on);
    color: #1a1a1a;
    padding: 8px 18px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    font: 900 13px/1 'Helvetica Neue', sans-serif;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }
  .marquee .ticker-item {
    white-space: nowrap;
  }
  .marquee .ticker-item span {
    color: var(--home);
    margin-left: 4px;
  }
  .marquee .ticker-item.away span { color: #1e6b8a; }
</style>
</head>
<body>
<div class="preview-label">jumbotron.html · 1280 × 720 · Stadium LED screen</div>
<div class="overlay">
  <div class="led-mask"></div>
  <div class="scanlines"></div>
  <div class="content">
    <div class="header">
      <div class="corner-left">▶ LIVE</div>
      <div class="title">Set Recap</div>

    </div>
    <div class="scoreboard">
      <div class="team-side home">

        <div class="team-score">25</div>
      </div>
      <div class="centre-display">
        <div class="label">Set</div>

      </div>
      <div class="team-side away">

    </div>
    <div class="chart-strip">
      <div class="label">▶ Progression</div>
      <svg viewBox="0 0 900 70" preserveAspectRatio="none">
        <line class="grid-tick" x1="0" y1="68" x2="900" y2="68" />

        <line class="grid-tick" x1="0" y1="2"  x2="900" y2="2"  />
        <polyline class="line-home" points="

          249,46 268,46 287,42 307,42 326,39 345,39 364,36 384,36 403,32 422,32 441,29 460,29

        "/>
        <polyline class="line-away" points="
          18,68 38,65 57,65 76,65 96,62 115,62 134,59 153,56 172,56 192,56 211,52 230,49
          249,49 268,46 287,46 307,42 326,42 345,39 364,39 384,36 403,36 422,32 441,32 460,29

        "/>
      </svg>
    </div>
    <div class="marquee">
      <span class="ticker-item">🔥 6-Run by <span>Wolves</span></span>
      <span class="ticker-item away">⏱ Timeout × 2 by <span>Hawks</span></span>
      <span class="ticker-item">🎯 Set Point @ 24-22</span>
      <span class="ticker-item">🏆 Wolves take set 2</span>
    </div>
  </div>
</div>
</body>
</html>
