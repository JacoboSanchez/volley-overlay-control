<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Split screen</title>
<style>
  :root {
    --bg: #0d1117;
    --panel-l: #14181f;
    --panel-r: #0a0d12;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: rgba(255,255,255,0.08);
    --home: #ff5577;
    --away: #ffb838;
    --accent: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background:
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="30" r="14" fill="%23ffffff" opacity="0.12"/><circle cx="70" cy="20" r="9" fill="%23ffffff" opacity="0.08"/><circle cx="60" cy="80" r="20" fill="%23ffffff" opacity="0.06"/></svg>'),
      linear-gradient(135deg, #2e7d32 0%, #1b5e20 35%, #f57c00 70%, #e65100 100%);
    background-blend-mode: overlay, normal;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid; place-items: center;
  }
  .preview-label {
    position: fixed; top: 12px; left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 0.04em;
  }
  .overlay {
    width: 1280px; height: 720px;
    display: grid;
    grid-template-columns: 1fr 1.2fr;
  }
  /* ── Left: info panel ─────────────────────────────── */
  .info {
    background: rgba(20, 24, 31, 0.68);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    padding: 64px 56px;
    display: flex; flex-direction: column;
    gap: 28px;
    position: relative;
  }
  .info::after {
    content: '';
    position: absolute;
    inset: 0 0 0 auto;
    width: 1px;
    background: var(--border);
  }
  .info .badge {
    display: inline-flex; align-items: center; gap: 10px;
    align-self: flex-start;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(46, 204, 113, 0.12);
    border: 1px solid rgba(46, 204, 113, 0.35);
    font: 700 13px/1 -apple-system, sans-serif;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .info .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }
  .info .set-title {
    font: 800 96px/0.9 -apple-system, sans-serif;
    letter-spacing: -0.04em;
  }
  .info .set-title em {
    font-weight: 400; font-style: normal;
    color: var(--muted);
  }
  .info .matchup {
    display: flex; flex-direction: column; gap: 18px;
  }
  .info .team-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    column-gap: 24px;
    padding: 14px 0;
    border-top: 1px solid var(--border);
  }
  .info .team-row:last-child { border-bottom: 1px solid var(--border); }
  .info .team-name {
    font: 700 28px/1 -apple-system, sans-serif;
    letter-spacing: -0.01em;
  }
  .info .team-row.home .team-name { color: var(--home); }
  .info .team-row.away .team-name { color: var(--away); }
  .info .team-score {
    font: 800 80px/0.9 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.04em;
  }
  .info .footer-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: auto;
  }
  .info .footer-stats .stat {
    display: flex; flex-direction: column; gap: 4px;
  }
  .info .footer-stats .stat .label {
    font: 600 10px/1 -apple-system, sans-serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .info .footer-stats .stat .value {
    font: 700 22px/1 'Menlo', 'Consolas', monospace;
  }
  /* ── Right: chart ─────────────────────────────────── */
  .chart {
    background: rgba(10, 13, 18, 0.62);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    padding: 56px;
    display: flex; flex-direction: column;
    gap: 20px;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .chart-header .label {
    font: 700 13px/1 -apple-system, sans-serif;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .chart-header .duration {
    font: 700 22px/1 'Menlo', 'Consolas', monospace;
    color: var(--accent);
  }
  .chart-body {
    flex: 1;
    position: relative;
  }
  .chart-body svg {
    width: 100%; height: 100%;
  }
  .chart-axis {
    fill: var(--muted);
    font: 11px 'Menlo', monospace;
    letter-spacing: 0.04em;
  }
  .grid-faint { stroke: rgba(255,255,255,0.06); stroke-width: 1; stroke-dasharray: 2 3; }
  .grid-main  { stroke: rgba(255,255,255,0.12); stroke-width: 1; }
  .line-home { stroke: var(--home); stroke-width: 3; fill: none; filter: drop-shadow(0 0 8px rgba(255,85,119,0.35)); }
  .line-away { stroke: var(--away); stroke-width: 3; fill: none; filter: drop-shadow(0 0 8px rgba(255,184,56,0.35)); }
  .timeout {
    stroke: rgba(255,255,255,0.3);
    stroke-width: 1;
    stroke-dasharray: 3 4;
  }
  .timeout-label {
    fill: rgba(255,255,255,0.55);
    font: 700 10px 'Menlo', monospace;
  }
  .chart-legend {
    display: flex;
    gap: 24px;
    justify-content: center;
    font: 600 13px/1 -apple-system, sans-serif;
    color: var(--muted);
  }
  .chart-legend .swatch {
    display: inline-block;
    width: 14px; height: 4px;
    border-radius: 2px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .chart-legend .swatch.home { background: var(--home); }
  .chart-legend .swatch.away { background: var(--away); }
</style>
</head>
<body>
<div class="preview-label">split-screen.html · 1280 × 720 · 50/50 info & chart</div>
<div class="overlay">
  <div class="info">
    <span class="badge">
      <span class="dot"></span>
      Set 2 · Final
    </span>
    <div class="set-title">Recap<br><em>of the set</em></div>
    <div class="matchup">
      <div class="team-row home">
        <span class="team-name">Thunder Wolves</span>
        <span class="team-score">25</span>
      </div>
      <div class="team-row away">
        <span class="team-name">Solar Hawks</span>
        <span class="team-score">22</span>
      </div>
    </div>
    <div class="footer-stats">
      <div class="stat">
        <span class="label">Streak</span>
        <span class="value">6</span>
      </div>
      <div class="stat">
        <span class="label">Services</span>
        <span class="value">8 / 6</span>
      </div>
      <div class="stat">
        <span class="label">Timeouts</span>
        <span class="value">0 · 2</span>
      </div>
    </div>
  </div>

  <div class="chart">
    <div class="chart-header">
      <span class="label">Point progression</span>
      <span class="duration">⏱ 4:32</span>
    </div>
    <div class="chart-body">
      <svg viewBox="0 0 580 480" preserveAspectRatio="none">
        <!-- y axis -->
        <text class="chart-axis" x="6"  y="18">25</text>
        <text class="chart-axis" x="6"  y="248">12</text>
        <text class="chart-axis" x="6"  y="472">0</text>
        <!-- baselines -->
        <line class="grid-main"  x1="30" y1="472" x2="580" y2="472" />
        <line class="grid-faint" x1="30" y1="248" x2="580" y2="248" />
        <line class="grid-faint" x1="30" y1="14"  x2="580" y2="14"  />
        <!-- timeouts -->
        <line class="timeout" x1="404" y1="14" x2="404" y2="472" />
        <text class="timeout-label" x="392" y="10">T</text>
        <line class="timeout" x1="492" y1="14" x2="492" y2="472" />
        <text class="timeout-label" x="480" y="10">T</text>
        <!-- home (25 pts across 47 events) -->
        <polyline class="line-home" points="
          42,455 53,455 64,437 75,420 86,420 97,402 108,402 119,402 130,385 141,367 152,367 163,367
          174,350 185,350 196,332 207,332 218,314 229,314 240,297 251,297 262,279 273,279 284,262 295,262
          306,244 317,227 328,209 339,192 350,174 361,157
          372,157 383,157 394,157 405,139 416,139 427,122 438,122 449,104 460,104 471,87 482,87 493,69 504,69 515,69 526,69 537,69 548,69 559,52 570,52 580,34
        "/>
        <!-- away (22 pts across 47 events) -->
        <polyline class="line-away" points="
          42,472 53,455 64,455 75,455 86,437 97,437 108,420 119,402 130,402 141,402 152,385 163,367
          174,367 185,350 196,350 207,332 218,332 229,314 240,314 251,297 262,297 273,279 284,279 295,262
          306,262 317,262 328,262 339,262 350,262 361,262
          372,244 383,227 394,209 405,209 416,192 427,192 438,174 449,174 460,157 471,157 482,139 493,122 504,122 515,122 526,104 537,87 548,87 559,87 570,69 580,69
        "/>
      </svg>
    </div>
    <div class="chart-legend">
      <span><span class="swatch home"></span>Thunder Wolves</span>
      <span><span class="swatch away"></span>Solar Hawks</span>
    </div>
  </div>
</div>
</body>
</html>
