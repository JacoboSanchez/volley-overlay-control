<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Card minimalista</title>
<style>
  :root {
    --bg: #0d1117;
    --text: #e6edf3;
    --muted: #8b949e;
    --panel: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.08);
    --grid: rgba(255, 255, 255, 0.08);
    --home: #d4314c;
    --away: #f0a020;
    --accent: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid;
    place-items: center;
  }
  .preview-label {
    position: fixed;
    top: 12px;
    left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .overlay {
    width: 1100px;
    height: 340px;
    background: linear-gradient(180deg, #11151c 0%, #0d1117 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 28px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    row-gap: 14px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
  }
  /* ── Header ────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .header .set-label {
    font: 700 14px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .header .set-label strong { color: var(--text); }
  .header .duration {
    font: 600 16px/1 'Menlo', 'Consolas', monospace;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  /* ── Score ────────────────────────────────────────── */
  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    column-gap: 28px;
  }
  .team {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .team.home { align-items: flex-end; text-align: right; }
  .team.away { align-items: flex-start; text-align: left; }
  .team-name {
    font: 600 14px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .team-score {
    font: 700 72px/1 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.02em;
  }
  .team.home .team-score { color: var(--home); }
  .team.away .team-score { color: var(--away); }
  .score-divider {
    font: 700 36px/1 'Menlo', monospace;
    color: var(--muted);
    opacity: 0.5;
  }
  /* ── Chart ────────────────────────────────────────── */
  .chart {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 18px;
  }
  .chart svg {
    width: 100%;
    height: 70px;
    display: block;
  }
  .chart .stats {
    display: grid;
    grid-template-columns: repeat(2, auto);
    column-gap: 18px;
    row-gap: 4px;
    font: 13px/1.4 -apple-system, sans-serif;
    color: var(--muted);
    white-space: nowrap;
  }
  .chart .stats .value {
    font-weight: 700;
    color: var(--text);
    font-family: 'Menlo', 'Consolas', monospace;
  }
  .dot-home { fill: var(--home); }
  .dot-away { fill: var(--away); }
  .line-home { stroke: var(--home); stroke-width: 2; fill: none; }
  .line-away { stroke: var(--away); stroke-width: 2; fill: none; }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .timeout-tick { stroke: rgba(255,255,255,0.4); stroke-width: 1; stroke-dasharray: 2 3; }
</style>
</head>
<body>
<div class="preview-label">card.html · 1100 × 340 · Card minimalista</div>

<div class="overlay">
  <!-- Header -->
  <div class="header">
    <div class="set-label">Set <strong>2</strong> · Final</div>
    <div class="duration">4:32</div>
  </div>

  <!-- Score -->
  <div class="score-row">
    <div class="team home">
      <span class="team-name">Thunder Wolves</span>
      <span class="team-score">25</span>
    </div>
    <span class="score-divider">—</span>
    <div class="team away">
      <span class="team-name">Solar Hawks</span>
      <span class="team-score">22</span>
    </div>
  </div>

  <!-- Chart + stats -->
  <div class="chart">
    <svg viewBox="0 0 600 70" preserveAspectRatio="none">
      <!-- grid -->
      <line class="grid-line" x1="0" y1="35" x2="600" y2="35" />
      <line class="grid-line" x1="0" y1="0"  x2="600" y2="0"  />
      <line class="grid-line" x1="0" y1="70" x2="600" y2="70" />
      <!-- timeout ticks (around event 33 and 41) -->
      <line class="timeout-tick" x1="420" y1="0" x2="420" y2="70" />
      <line class="timeout-tick" x1="523" y1="0" x2="523" y2="70" />
      <!-- home line (25 points across 47 events) -->
      <polyline class="line-home" points="
        13,67 25,67 38,64 51,61 64,61 76,58 89,58 102,58 114,55 127,52 140,52 153,52
        165,49 178,49 191,46 204,46 217,43 229,43 242,40 255,40 268,37 280,37 293,34 306,34
        319,31 331,28 344,25 357,22 370,19 383,16
        395,16 408,16 421,16 433,13 446,13 459,10 472,10 485,7 498,7 510,4 523,4 536,1 549,1 562,1 574,1 587,1 600,0
      "/>
      <!-- away line (22 points across 47 events) -->
      <polyline class="line-away" points="
        13,70 25,67 38,67 51,67 64,64 76,64 89,61 102,58 114,58 127,58 140,55 153,52
        165,52 178,49 191,49 204,46 217,46 229,43 242,43 255,40 268,40 280,37 293,37 306,34
        319,34 331,34 344,34 357,34 370,34 383,34
        395,31 408,28 421,25 433,25 446,22 459,22 472,19 485,19 498,16 510,16 523,13 536,10 549,10 562,10 574,7 587,4 600,4
      "/>
    </svg>
    <div class="stats">
      <span>Longest streak</span><span class="value">H 6</span>
      <span>Services won</span><span class="value">8/15</span>
      <span>Timeouts</span><span class="value">0/2 · 2/2</span>
      <span>Total points</span><span class="value">47</span>
    </div>
  </div>
</div>
</body>
</html>
