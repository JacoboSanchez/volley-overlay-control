<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Set summary — Winner podium</title>
<style>
  :root {
    --bg: #0a0d12;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: rgba(255,255,255,0.08);
    --home: #d4314c;
    --away: #f0a020;
    --gold: #ffd64a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: grid; place-items: center;
  }
  .preview-label {
    position: fixed; top: 12px; left: 12px;
    font: 12px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted); letter-spacing: 0.04em;
    z-index: 10;
  }
  .overlay {
    width: 1280px; height: 720px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255, 214, 74, 0.12) 0%, transparent 55%),
      linear-gradient(180deg, #11151c 0%, #0a0d12 100%);
    padding: 36px 56px 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    row-gap: 16px;
    position: relative;
    overflow: hidden;
  }
  /* ── Header ───────────────────────────────────────── */
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .header .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(255, 214, 74, 0.14);
    border: 1px solid rgba(255, 214, 74, 0.45);
    color: var(--gold);
    font: 800 12px/1 -apple-system, sans-serif;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }
  .header .badge .crown { font-size: 16px; }
  .header .meta {
    display: flex; gap: 28px;
    font: 700 14px/1 'Menlo', 'Consolas', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .header .meta strong { color: var(--text); }
  /* ── Podium ───────────────────────────────────────── */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: end;
    gap: 60px;
    padding: 0 40px;
  }
  .pillar {
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
    padding: 28px 32px 22px;
    display: flex; flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    box-shadow: 0 -16px 60px rgba(0,0,0,0.5);
  }
  .pillar.winner {
    background: linear-gradient(180deg, var(--home) 0%, rgba(212, 49, 76, 0.7) 100%);
    height: 380px;
  }
  .pillar.runner-up {
    background: linear-gradient(180deg, var(--away) 0%, rgba(240, 160, 32, 0.55) 100%);
    height: 260px;
  }
  .pillar::before {
    /* sheen */
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.25) 100%);
    border-top-left-radius: inherit;
    border-top-right-radius: inherit;
    pointer-events: none;
  }
  .pillar > * { position: relative; z-index: 1; }
  .pillar .crown-icon {
    font-size: 36px;
    margin-bottom: 4px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .pillar .position {
    font: 800 14px/1 -apple-system, sans-serif;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .pillar .team-name {
    font: 800 32px/1.05 -apple-system, sans-serif;
    letter-spacing: -0.01em;
    color: #fff;
    margin-bottom: 14px;
  }
  .pillar .score {
    font: 900 130px/0.85 'Menlo', 'Consolas', monospace;
    letter-spacing: -0.05em;
    color: #fff;
    text-shadow: 0 6px 20px rgba(0,0,0,0.4);
    margin: auto 0;
  }
  .pillar.runner-up .score {
    font-size: 96px;
  }
  .pillar .pillar-stat {
    font: 600 14px/1.3 -apple-system, sans-serif;
    color: rgba(255,255,255,0.85);
    text-align: center;
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.25);
  }
  .pillar .pillar-stat strong {
    font-weight: 800;
    font-family: 'Menlo', monospace;
    font-size: 18px;
    display: block;
    margin-bottom: 2px;
  }
  /* ── Floor + chart ribbon ─────────────────────────── */
  .floor {
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
    border-top: 1px solid var(--border);
    padding: 18px 36px 24px;
    margin: 0 -56px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 24px;
  }
  .floor .floor-label {
    font: 700 12px/1 -apple-system, sans-serif;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .floor .chart {
    height: 80px;
  }
  .floor .chart svg { width: 100%; height: 100%; display: block; }
  .line-home { stroke: var(--home); stroke-width: 2.5; fill: none; }
  .line-away { stroke: var(--away); stroke-width: 2.5; fill: none; }
  .grid-faint { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
  .floor .duration {
    font: 700 24px/1 'Menlo', 'Consolas', monospace;
    color: var(--gold);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="preview-label">podium.html · 1280 × 720 · Winner podium</div>
<div class="overlay">
  <div class="header">
    <span class="badge">
      <span class="crown">👑</span>
      Set 2 · Wolves take it
    </span>
    <div class="meta">
      <span>Match <strong>1 – 1</strong></span>
      <span>Best of <strong>5</strong></span>
      <span>4:32</span>
    </div>
  </div>

  <div class="podium">
    <div class="pillar winner">
      <span class="crown-icon">🏆</span>
      <span class="position">Set winner</span>
      <span class="team-name">Thunder Wolves</span>
      <span class="score">25</span>
      <div class="pillar-stat">
        <strong>6-point run</strong>
        from 12–12 to 18–12
      </div>
    </div>
    <div class="pillar runner-up">
      <span class="position">Runner-up</span>
      <span class="team-name">Solar Hawks</span>
      <span class="score">22</span>
      <div class="pillar-stat">
        <strong>Both timeouts</strong>
        used trying to break the run
      </div>
    </div>
  </div>

  <div class="floor">
    <span class="floor-label">Point progression</span>
    <div class="chart">
      <svg viewBox="0 0 800 80" preserveAspectRatio="none">
        <line class="grid-faint" x1="0" y1="78" x2="800" y2="78" />
        <line class="grid-faint" x1="0" y1="40" x2="800" y2="40" />
        <line class="grid-faint" x1="0" y1="2"  x2="800" y2="2"  />
        <polyline class="line-home" points="
          16,75 33,75 50,72 67,68 84,68 101,65 118,65 135,65 152,61 169,58 186,58 203,58
          220,54 237,54 254,51 271,51 288,47 305,47 322,44 339,44 356,40 373,40 390,37 407,37
          424,33 441,30 458,26 475,23 492,19 509,16
          526,16 543,16 560,16 577,12 594,12 611,9 628,9 645,5 662,5 679,2 696,2 713,2 730,2 750,2 770,2 800,2
        "/>
        <polyline class="line-away" points="
          16,78 33,75 50,75 67,75 84,72 101,72 118,68 135,65 152,65 169,65 186,61 203,58
          220,58 237,54 254,54 271,51 288,51 305,47 322,47 339,44 356,44 373,40 390,40 407,37
          424,37 441,37 458,37 475,37 492,37 509,37
          526,33 543,30 560,26 577,26 594,23 611,23 628,19 645,19 662,16 679,16 696,12 713,9 730,9 750,9 770,5 800,5
        "/>
      </svg>
    </div>
    <span class="duration">⏱ 4:32</span>
  </div>
</div>
</body>
</html>
