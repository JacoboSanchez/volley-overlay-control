services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    restart: always
    ports:
      - ${EXTERNAL_PORT:-80}:8080
    environment:
      - PUID=1000 # change this to your user id
      - PGID=1000 # change this to your group id
      - APP_PORT=8080
      - APP_TITLE=${APP_TITLE:-Volley Scoreboard} #Optional
      # ---- Accounts & database (multi-user) ----
      - DATABASE_URL=${DATABASE_URL:-} #Optional: SQLAlchemy URL; default SQLite under the data volume. Postgres: postgresql+psycopg://user:pass@db:5432/volley
      - SESSION_SECRET=${SESSION_SECRET:-} #Optional: cookie/report-signing key; auto-generated + persisted to data/.session_secret if unset
      - REGISTRATION_OPEN=${REGISTRATION_OPEN:-} #Optional: pin public registration open/closed. Unset: open until the first admin is claimed, then auto-closed (an admin can toggle it later; DB wins)
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN:-} #Optional: first-admin claim token; auto-generated + printed to the startup log if unset
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-} #Optional: force the Secure cookie flag (default: auto by scheme)
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-} #Optional: login session lifetime in hours (default 336 = 14 days)
      - OVERLAY_PUBLIC_URL=${OVERLAY_PUBLIC_URL:-} #Optional (public URL for overlay links behind a reverse proxy)
      - ENABLE_MULTITHREAD=${ENABLE_MULTITHREAD:-true}
      - CUSTOMIZATION_CACHE_TTL_SECONDS=${CUSTOMIZATION_CACHE_TTL_SECONDS:-} #Optional: single TTL override for both customization caches
      - REMOTE_CONFIG_URL=${REMOTE_CONFIG_URL:-} #Optional: remote JSON config fetched on startup
      - LOGGING_LEVEL=${LOGGING_LEVEL:-warning}
      - LOG_FORMAT=${LOG_FORMAT:-text} #Optional: text|json
      - LOG_FILE=${LOG_FILE:-} #Optional: when set, also write JSON logs to this path
      - LOG_FILE_MAX_BYTES=${LOG_FILE_MAX_BYTES:-10485760}
      - LOG_FILE_BACKUPS=${LOG_FILE_BACKUPS:-5}
      - LOG_REDACT=${LOG_REDACT:-1} #Optional: 0/false to disable PII redaction in dev
      - APP_TEAMS=${APP_TEAMS:-}
      - MATCH_GAME_POINTS=${MATCH_GAME_POINTS:-25}
      - MATCH_GAME_POINTS_LAST_SET=${MATCH_GAME_POINTS_LAST_SET:-15}
      - MATCH_SETS=${MATCH_SETS:-5}
      - STALE_SET_THRESHOLD_MINUTES=${STALE_SET_THRESHOLD_MINUTES:-60} #Optional: minutes a single set may run before the control-UI "abandoned match" prompt fires; 0 disables
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-} #Optional: comma-separated allow-list of Host header values (wildcards OK)
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-} #Optional: comma-separated allow-list of cross-origin SPA hosts (no wildcards)
      - MATCH_REPORT_PUBLIC=${MATCH_REPORT_PUBLIC:-false} #Optional: open match-report routes to anonymous reads
      - REST_USER_AGENT=${REST_USER_AGENT:-}
      - APP_THEMES=${APP_THEMES:-}
      - WEBHOOKS_URL=${WEBHOOKS_URL:-} #Optional: single outbound webhook endpoint
      - WEBHOOKS_SECRET=${WEBHOOKS_SECRET:-} #Optional: HMAC-SHA256 secret for the single endpoint
      - WEBHOOKS_JSON=${WEBHOOKS_JSON:-} #Optional: multi-target webhook config as JSON
      - WEBHOOKS_EVENTS=${WEBHOOKS_EVENTS:-} #Optional: CSV subset of events for the single-URL webhook
      - WEBHOOKS_TIMEOUT_S=${WEBHOOKS_TIMEOUT_S:-5} #Optional: per-target POST timeout in seconds
      - WEBHOOKS_ALLOW_PRIVATE_IPS=${WEBHOOKS_ALLOW_PRIVATE_IPS:-} #Optional: allow webhook targets on private/loopback IPs (SSRF opt-out)
      - PERF_GET_STATE_WARN_MS=${PERF_GET_STATE_WARN_MS:-50} #Optional: slow-path threshold for GET /api/v1/state
    healthcheck:
      # python:3.12-slim does not ship with curl; use urllib instead of
      # installing an extra binary just for the probe.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - overlay_data:/app/data
    logging:
      # Cap stdout/stderr capture so a chatty incident can't fill the host
      # disk. Override DOCKER_LOG_MAX_SIZE / DOCKER_LOG_MAX_FILE in .env.
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: ${DOCKER_LOG_MAX_FILE:-5}
volumes:
  overlay_data:
