[pytest]
asyncio_mode = auto
log_cli = true
log_cli_level = error
log_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_date_format = %Y-%m-%d %H:%M:%S
markers =
    mobile_browser: requires a running app server and Playwright browser binaries (excluded from CI default run)