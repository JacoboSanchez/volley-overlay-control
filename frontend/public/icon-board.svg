<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Scoreboard">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f57"/>
      <stop offset="1" stop-color="#15162b"/>
    </linearGradient>
    <!-- Home / away accents — the same warm and cool pair the base app icon
         (icon.svg) assigns to its two score windows, so the board icon reads
         as a sibling of the app icon rather than an unrelated mark. -->
    <linearGradient id="bLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a5b"/>
      <stop offset="1" stop-color="#ff3d6e"/>
    </linearGradient>
    <linearGradient id="bRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5ad1e6"/>
      <stop offset="1" stop-color="#3a8dff"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background: maskable launchers crop the corners. -->
  <rect width="512" height="512" fill="url(#bbg)"/>

  <!-- Two score windows reading "0 : 0" — a scoreboard for any sport, not a
       single ball. Kept within the maskable safe zone (centred, ~180px from
       centre at the far corners, inside the 205px safe radius). -->
  <rect x="92" y="184" width="148" height="144" rx="30" fill="url(#bLeft)"/>
  <rect x="272" y="184" width="148" height="144" rx="30" fill="url(#bRight)"/>

  <!-- Subtle gloss on the top of each window. -->
  <rect x="92" y="184" width="148" height="58" rx="30" fill="#ffffff" opacity="0.15"/>
  <rect x="272" y="184" width="148" height="58" rx="30" fill="#ffffff" opacity="0.15"/>

  <!-- The two zeros. -->
  <ellipse cx="166" cy="256" rx="33" ry="46" fill="none" stroke="#ffffff" stroke-width="17"/>
  <ellipse cx="346" cy="256" rx="33" ry="46" fill="none" stroke="#ffffff" stroke-width="17"/>

  <!-- Colon divider. -->
  <circle cx="256" cy="235" r="11" fill="#eef1fb"/>
  <circle cx="256" cy="277" r="11" fill="#eef1fb"/>
</svg>
