<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Scoreboard">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f57"/>
      <stop offset="1" stop-color="#15162b"/>
    </linearGradient>
    <linearGradient id="bball" x1="0.2" y1="0.1" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde3f1"/>
    </linearGradient>
    <linearGradient id="bseam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a5b"/>
      <stop offset="1" stop-color="#ff3d6e"/>
    </linearGradient>
    <radialGradient id="bshine" cx="0.36" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bclip"><circle cx="256" cy="256" r="176"/></clipPath>
  </defs>

  <!-- Full-bleed background: maskable launchers crop the corners. -->
  <rect width="512" height="512" fill="url(#bbg)"/>

  <!-- Ball, centred inside the maskable safe zone. -->
  <circle cx="256" cy="256" r="176" fill="url(#bball)"/>

  <!-- Three curved "meridian" seams bowing the same way (volleyball / beach
       ball swirl), rotated 120° apart — the pinwheel that reads as a
       volleyball rather than a basketball's straight cross. Clipped to the
       ball so the bows stay inside. -->
  <g clip-path="url(#bclip)" fill="none" stroke="url(#bseam)" stroke-width="21" stroke-linecap="round">
    <path d="M256 80 Q330 256 256 432"/>
    <path d="M256 80 Q330 256 256 432" transform="rotate(120 256 256)"/>
    <path d="M256 80 Q330 256 256 432" transform="rotate(240 256 256)"/>
  </g>

  <!-- Glossy highlight. -->
  <circle cx="256" cy="256" r="176" fill="url(#bshine)"/>
</svg>
