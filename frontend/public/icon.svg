<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#232848"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <radialGradient id="ball" cx="42%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#fffde8"/>
      <stop offset="60%" stop-color="#f5f0d0"/>
      <stop offset="100%" stop-color="#e8deb5"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Volleyball -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="248" r="160" fill="url(#ball)"/>

    <!-- Volleyball seam lines -->
    <!-- Vertical curve left -->
    <path d="M208 92 C180 170, 178 310, 210 400"
          fill="none" stroke="#c4b78a" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Vertical curve right -->
    <path d="M304 92 C332 170, 334 310, 302 400"
          fill="none" stroke="#c4b78a" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Horizontal curve top -->
    <path d="M100 210 C170 240, 342 240, 412 210"
          fill="none" stroke="#c4b78a" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Diagonal curve top-left to bottom-right -->
    <path d="M130 140 C200 200, 310 296, 382 356"
          fill="none" stroke="#c4b78a" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Diagonal curve top-right to bottom-left -->
    <path d="M382 140 C312 200, 202 296, 130 356"
          fill="none" stroke="#c4b78a" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Score accent bar -->
  <rect x="156" y="430" width="200" height="36" rx="18" fill="#4fc3f7" opacity="0.9"/>
  <text x="256" y="455" font-family="system-ui, sans-serif" fill="#1a1a2e" text-anchor="middle">
    <tspan font-weight="800" font-size="22" letter-spacing="1">25</tspan>
    <tspan font-weight="600" font-size="18" opacity="0.6"> - </tspan>
    <tspan font-weight="800" font-size="22" letter-spacing="1">23</tspan>
  </text>
</svg>
