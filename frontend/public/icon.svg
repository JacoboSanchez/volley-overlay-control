<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Volley Scoreboard">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f57"/>
      <stop offset="1" stop-color="#15162b"/>
    </linearGradient>
    <linearGradient id="vball" x1="0.2" y1="0.1" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde3f1"/>
    </linearGradient>
    <linearGradient id="vseam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a5b"/>
      <stop offset="1" stop-color="#ff3d6e"/>
    </linearGradient>
    <radialGradient id="vshine" cx="0.36" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="vclip"><circle cx="256" cy="256" r="176"/></clipPath>
  </defs>

  <!-- Full-bleed background: maskable launchers crop the corners. -->
  <rect width="512" height="512" fill="url(#vbg)"/>

  <!-- Ball (kept inside the maskable safe zone, centred). -->
  <circle cx="256" cy="256" r="176" fill="url(#vball)"/>

  <!-- Bold stylised volleyball seams, clipped to the ball. -->
  <g clip-path="url(#vclip)" fill="none" stroke="url(#vseam)" stroke-width="24" stroke-linecap="round">
    <path d="M196 92 C250 220 248 300 156 424"/>
    <path d="M368 132 C250 232 300 326 320 436"/>
    <path d="M72 300 C220 300 300 366 452 252"/>
  </g>

  <!-- Glossy highlight. -->
  <circle cx="256" cy="256" r="176" fill="url(#vshine)"/>
</svg>
