name: CI Pipeline

permissions:
  contents: read

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Only cancel in-flight runs on PR branches. Pushes to main/dev still run
  # to completion so we keep a green-build signal on protected branches.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Run Pytest and Linters
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: 'pip' # caching pip dependencies
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip uv
        # Install pinned runtime + dev dependencies from lockfiles for reproducible builds.
        uv pip install --system -r requirements.lock -r requirements-dev.lock
        # Pin ruff and mypy to the same versions as .pre-commit-config.yaml so
        # local pre-commit and CI run identical checks. Floating to "latest"
        # previously let a newer mypy surface errors that a stale pinned
        # pre-commit hook never saw. Bumping these is a deliberate change that
        # should land in its own PR with the new findings reviewed.
        uv pip install --system ruff==0.15.8 mypy==1.19.1

    - name: Lint with ruff
      run: ruff check .

    - name: Type-check with mypy
      run: mypy

    - name: Run Test Suite
      # Ensure tests have access to a clean environment
      env:
        APP_PORT: 8080
        UNO_OVERLAY_OID: dummy_token_for_tests
      run: |
        pytest tests/ \
          --cov=app \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-fail-under=70

    - name: Upload coverage artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-xml
        path: coverage.xml
        if-no-files-found: ignore

  frontend:
    name: Frontend typecheck, tests and schema drift
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -r requirements.lock

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Regenerate OpenAPI schema and TypeScript types
      run: |
        python scripts/generate_openapi.py
        cd frontend && npm run gen:types

    - name: Fail if generated schema files drift from committed copies
      run: |
        if ! git diff --exit-code -- frontend/schema/openapi.json frontend/src/api/schema.d.ts; then
          echo ""
          echo "::error::Generated schema is out of date."
          echo "Run 'python scripts/generate_openapi.py && (cd frontend && npm run gen:types)' and commit the result."
          exit 1
        fi

    - name: Lint
      working-directory: frontend
      run: npm run lint

    - name: Prettier format check
      working-directory: frontend
      run: npm run format:check

    - name: Typecheck
      working-directory: frontend
      run: npm run typecheck

    - name: Run Vitest with coverage gate
      working-directory: frontend
      run: npm run test:coverage

    - name: Upload frontend coverage artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage
        path: frontend/coverage/lcov.info
        if-no-files-found: ignore

  security-scan:
    # Surfaces dependency CVEs and risky-pattern findings on every PR.
    # The scanners are configured to FAIL on issues in the codebase /
    # the pinned lockfiles so a regression is caught before merge.
    # ``continue-on-error`` is intentionally NOT set: an operator
    # adding a vulnerable pin should see a red check and have to either
    # bump the dep or document the suppression in pyproject.toml /
    # ``# nosec`` comments.
    name: Security scanners (bandit, pip-audit, npm audit)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install scanners
      run: |
        python -m pip install --upgrade pip
        # Pin Bandit and pip-audit to known-good majors so the scan
        # output is stable across CI runs. Bumping them is a
        # deliberate operator decision that should land in its own
        # PR with the diff of new findings reviewed.
        pip install "bandit[toml]==1.7.*" "pip-audit==2.*"

    - name: Bandit static analysis
      # ``-r`` walks the package; ``-q`` suppresses progress output.
      # ``--severity-level medium`` filters out the LOW noise Bandit
      # emits for things like ``random`` usage in non-security paths;
      # we still want HIGH/MEDIUM findings to fail the job.
      # The repo already uses targeted ``# nosec`` comments where a
      # pattern is intentional (see app/auth_utils.py, app/match_report.py).
      run: |
        bandit -r app/ -q --severity-level medium

    - name: pip-audit (runtime lockfile)
      # Runs against the runtime lockfile so a CVE in a transitive
      # dep surfaces here. The dev lockfile is scanned in the next
      # step to catch issues in tooling without conflating the two.
      run: |
        pip-audit -r requirements.lock --strict

    - name: pip-audit (dev lockfile)
      run: |
        pip-audit -r requirements-dev.lock --strict

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: npm audit (runtime + transitive)
      working-directory: frontend
      # ``--omit=dev`` skips the toolchain (Vite, Vitest, etc.) so a
      # known-low CVE in a build-only dep doesn't block production
      # changes. ``--audit-level=high`` matches the Bandit threshold:
      # we want HIGH+ findings to fail, not every advisory.
      run: |
        npm audit --omit=dev --audit-level=high

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Build production image
      run: docker build -t volley-overlay-control:ci .
