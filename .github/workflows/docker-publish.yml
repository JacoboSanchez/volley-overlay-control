name: Publish Release Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v5.1.1)'
        required: true
        type: string
      also_latest:
        description: 'Also push :latest'
        required: false
        type: boolean
        default: true

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Resolve release tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag='${{ inputs.tag }}'
            latest='${{ inputs.also_latest }}'
          else
            tag='${{ github.event.release.tag_name }}'
            latest='true'
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "also_latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Check out the repo
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.rel.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ${{ secrets.DOCKER_IMAGE }}:${{ steps.rel.outputs.tag }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_TAG }}:${{ steps.rel.outputs.tag }}
            ${{ steps.rel.outputs.also_latest == 'true' && format('{0}:latest', secrets.DOCKER_HUB_TAG) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,mode=max,scope=docker-release
      
