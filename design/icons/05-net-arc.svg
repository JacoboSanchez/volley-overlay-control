<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6dd8"/>
      <stop offset="60%" stop-color="#143a8f"/>
      <stop offset="100%" stop-color="#0e1f52"/>
