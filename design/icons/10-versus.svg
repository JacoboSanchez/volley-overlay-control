    <g fill="none" stroke="#1f2a44" stroke-width="9" stroke-linecap="round">
      <path d="M-68 -50 C-42 -76 12 -82 38 -88"/>
      <path d="M-80 8 C-32 -12 26 -6 70 -44"/>
      <path d="M-42 82 C-62 38 -58 -18 -36 -76"/>
