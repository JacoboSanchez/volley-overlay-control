<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blue10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/><stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="red10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <radialGradient id="ball10" cx="40%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e6ebf5"/>
    </radialGradient>
    <clipPath id="round10"><rect width="512" height="512" rx="112"/></clipPath>
    <filter id="sh10" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g clip-path="url(#round10)">
