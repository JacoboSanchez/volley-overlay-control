<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2348"/>
      <stop offset="100%" stop-color="#121327"/>
    </linearGradient>
    <linearGradient id="l8a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/><stop offset="100%" stop-color="#2196f3"/>
    </linearGradient>
    <radialGradient id="ball8" cx="40%" cy="35%" r="62%">
