<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26305c"/>
      <stop offset="100%" stop-color="#121327"/>
    </linearGradient>
    <linearGradient id="court7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f7be0"/>
      <stop offset="100%" stop-color="#1657b8"/>
    </linearGradient>
    <radialGradient id="ball7" cx="40%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3e9f4"/>
    </radialGradient>
    <filter id="sh7" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg7)"/>
  <!-- aerial court in perspective -->
  <g filter="url(#sh7)">
    <path d="M150 372 L362 372 L420 200 L92 200 Z" fill="url(#court7)"/>
    <g stroke="#bfe0ff" stroke-width="4" opacity="0.85" fill="none">
      <!-- center net line -->
      <path d="M118 286 L394 286" stroke-width="6"/>
      <!-- attack lines -->
      <path d="M104 243 L408 243" opacity="0.6"/>
      <path d="M132 329 L380 329" opacity="0.6"/>
      <!-- outline -->
      <path d="M150 372 L362 372 L420 200 L92 200 Z" stroke-width="5" opacity="0.95"/>
    </g>
  </g>
  <!-- ball above court -->
  <g filter="url(#sh7)" transform="translate(256,176)">
    <circle r="80" fill="url(#ball7)"/>
    <g fill="none" stroke="#1f2a44" stroke-width="8" stroke-linecap="round">
      <path d="M-46 -34 C-28 -52 8 -56 26 -60"/>
      <path d="M-54 6 C-22 -8 18 -4 48 -30"/>
      <path d="M-28 56 C-42 26 -40 -12 -24 -52"/>
      <path d="M40 52 C56 22 56 -16 36 -54"/>
    </g>
  </g>
</svg>
