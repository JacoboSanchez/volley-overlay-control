    <g fill="none" stroke="#1f2a44" stroke-width="9" stroke-linecap="round">
      <path d="M-60 -44 C-38 -66 8 -70 34 -76"/>
      <path d="M-70 8 C-28 -10 22 -4 64 -38"/>
      <path d="M-36 72 C-54 34 -50 -16 -30 -64"/>
