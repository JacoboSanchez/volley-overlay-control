<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#23284d"/><stop offset="100%" stop-color="#13142a"/></linearGradient>
    <radialGradient id="ball" cx="40%" cy="36%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#dde3ee"/></radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- bold symmetric broadcast waves both sides -->
  <g fill="none" stroke="#4fc3f7" stroke-linecap="round">
    <path d="M168 176 A150 150 0 0 0 168 336" stroke-width="14"/>
    <path d="M132 144 A196 196 0 0 0 132 368" stroke-width="12" opacity="0.55"/>
    <path d="M344 176 A150 150 0 0 1 344 336" stroke-width="14"/>
    <path d="M380 144 A196 196 0 0 1 380 368" stroke-width="12" opacity="0.55"/>
  </g>
  <!-- ball -->
  <g filter="url(#sh)" transform="translate(256,256)">
