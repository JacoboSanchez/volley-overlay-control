<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#23284d"/><stop offset="100%" stop-color="#13142a"/></linearGradient>
    <radialGradient id="ball" cx="40%" cy="36%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#dde3ee"/></radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- ball as the transmitter, lower-left -->
  <g filter="url(#sh)" transform="translate(192,320)">
    <circle r="96" fill="url(#ball)"/>
    <g fill="none" stroke="#1f2a44" stroke-width="9" stroke-linecap="round">
      <path d="M-56 -40 C-36 -60 6 -64 32 -70"/>
      <path d="M-64 8 C-26 -8 20 -2 56 -32"/>
      <path d="M-34 66 C-50 32 -46 -12 -28 -58"/>
      <path d="M46 62 C66 26 66 -18 40 -60"/>
    </g>
  </g>
  <!-- signal waves emanating to upper-right -->
  <g fill="none" stroke="#4fc3f7" stroke-linecap="round">
    <path d="M256 256 A60 60 0 0 1 316 196" stroke-width="16"/>
    <path d="M256 212 A104 104 0 0 1 360 108" stroke-width="14" opacity="0.7"/>
    <path d="M256 168 A148 148 0 0 1 404 20" stroke-width="12" opacity="0.45"/>
  </g>
  <!-- REC dot at apex -->
  <circle cx="404" cy="108" r="24" fill="#f44336"/>
</svg>
