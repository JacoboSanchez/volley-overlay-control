<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#202549"/><stop offset="100%" stop-color="#141528"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#262c54"/><stop offset="100%" stop-color="#1a2042"/></linearGradient>
    <radialGradient id="ball" cx="40%" cy="35%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e3e9f4"/></radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
