<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#23284d"/><stop offset="100%" stop-color="#13142a"/></linearGradient>
    <radialGradient id="ball" cx="40%" cy="36%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#dde3ee"/></radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- red recording ring around the ball -->
  <circle cx="256" cy="256" r="166" fill="none" stroke="#f44336" stroke-width="18"/>
  <circle cx="256" cy="256" r="166" fill="none" stroke="#ff8a80" stroke-width="4" opacity="0.6"/>
  <!-- ball -->
  <g filter="url(#sh)" transform="translate(256,256)">
    <circle r="126" fill="url(#ball)"/>
    <g fill="none" stroke="#1f2a44" stroke-width="9" stroke-linecap="round">
      <path d="M-72 -52 C-46 -78 12 -84 40 -90"/>
      <path d="M-86 8 C-34 -12 28 -8 78 -46"/>
      <path d="M-44 86 C-66 40 -62 -20 -38 -80"/>
      <path d="M60 82 C84 36 84 -24 56 -84"/>
    </g>
  </g>
  <!-- REC badge top-right on the ring -->
  <g filter="url(#sh)">
    <rect x="296" y="92" width="118" height="48" rx="24" fill="#f44336"/>
    <circle cx="322" cy="116" r="11" fill="#fff"/>
    <text x="346" y="125" font-family="system-ui,Arial,sans-serif" font-weight="800" font-size="24" letter-spacing="2" fill="#fff">REC</text>
  </g>
</svg>
