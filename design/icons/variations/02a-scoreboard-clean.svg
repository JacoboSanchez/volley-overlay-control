<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#202549"/><stop offset="100%" stop-color="#141528"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#262c54"/><stop offset="100%" stop-color="#1a2042"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Clean scoreboard, no ball -->
  <g filter="url(#sh)">
    <rect x="70" y="158" width="372" height="196" rx="30" fill="url(#panel)" stroke="#39406e" stroke-width="3"/>
  </g>
  <!-- team color tabs -->
  <rect x="70" y="158" width="22" height="196" rx="11" fill="#2196f3"/>
  <rect x="420" y="158" width="22" height="196" rx="11" fill="#f44336"/>
  <rect x="253" y="186" width="6" height="140" rx="3" fill="#39406e"/>
  <text x="180" y="298" font-family="'DejaVu Sans Mono',monospace" font-weight="800" font-size="128" fill="#4fc3f7" text-anchor="middle">25</text>
  <text x="332" y="298" font-family="'DejaVu Sans Mono',monospace" font-weight="800" font-size="128" fill="#ff7a45" text-anchor="middle">23</text>
</svg>
