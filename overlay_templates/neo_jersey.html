{% extends "base.html" %}

{% block title %}Neo-Jersey Overlay — {{ target_id }}{% endblock %}

{% block head_fonts %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
{% endblock %}

{% block head_css %}
    <link rel="stylesheet" href="/static/css/neo_jersey.css?v={{ v }}">
{% endblock %}

{% block body_content %}
    <div id="scoreboard-container" class="scoreboard">

        <!-- ── Team Home ── -->
        <div class="team team-home">
            <!--
                serving-indicator is zero-size and invisible.
                app.js toggles .active on it; CSS uses the adjacent
                sibling combinator to trigger the logo halo.
            -->
            <div class="serving-indicator" id="home-serving"></div>

            <div class="logo-container">
                <img class="team-logo" id="home-logo" src="" alt=""
                     onerror="this.style.display='none'">
            </div>

            <!-- .name-panel presence makes app.js use the CSS-driven
                 compact path (isCssDriven = true), so set-history
                 visibility is controlled entirely by our CSS transitions. -->
            <div class="name-panel">
                <div class="team-name" id="home-name">HOME</div>
            </div>

            <div class="jersey-group">
                <div class="jersey-icon"></div>
                <div class="timeout-container" id="home-timeouts">
                    <div class="timeout-dot"></div>
                    <div class="timeout-dot"></div>
                </div>
            </div>

            <div class="score-section">
                <div class="sets" id="home-sets">0</div>
                <div class="points-container">
                    <div class="points" id="home-points">0</div>
                </div>
            </div>
        </div>

        <!-- ── Team Away ── -->
        <div class="team team-away">
            <div class="serving-indicator" id="away-serving"></div>

            <div class="logo-container">
                <img class="team-logo" id="away-logo" src="" alt=""
                     onerror="this.style.display='none'">
            </div>

            <div class="name-panel">
                <div class="team-name" id="away-name">AWAY</div>
            </div>

            <div class="jersey-group">
                <div class="jersey-icon"></div>
                <div class="timeout-container" id="away-timeouts">
                    <div class="timeout-dot"></div>
                    <div class="timeout-dot"></div>
                </div>
            </div>

            <div class="score-section">
                <div class="sets" id="away-sets">0</div>
                <div class="points-container">
                    <div class="points" id="away-points">0</div>
                </div>
            </div>
        </div>

        <div class="history-strip">
            <div class="history-team-wrap home-wrap">
                <div class="history-team-label home-label"></div>
                <div class="set-history-container" id="home-history"></div>
            </div>
            <div class="history-divider"></div>
            <div class="history-team-wrap away-wrap">
                <div class="history-team-label away-label"></div>
                <div class="set-history-container" id="away-history"></div>
            </div>
        </div>

    </div>
{% endblock %}
