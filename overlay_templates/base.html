<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% block head_meta %}{% endblock %}
    <title>{% block title %}Volleyball Overlay — {{ target_id }}{% endblock %}</title>
    {% block head_fonts %}{% endblock %}
    <script src="/static/js/gsap.min.js?v=3.12.2"></script>
    {% block head_css %}{% endblock %}
    <!-- Set summary overlay (loaded on every style; activated by
         match_info.show_set_summary). Transparent over the stream. -->
    <link rel="stylesheet" href="/static/css/set_summary.css?v={{ v }}">
</head>
<body>

    {% block body_content %}{% endblock %}

    <!-- Bottom Ticker -->
    <div id="ticker-container" class="ticker">
        <div class="ticker-text-wrapper">
            <div class="ticker-text" id="ticker-message"></div>
        </div>
    </div>

    <!-- Player Stats -->
    <div id="player-stats-container" class="player-stats">
        <div class="player-stats-content" id="player-stats-data"></div>
    </div>

    <!--
      The live-stats panel and points-history strip used to live
      here as opt-in widgets, but their config toggles were
      removed from the operator UI and the consensus is that the
      live overlay should show only the scoreboard (or the set
      summary, when activated). The same data is still computed by
      the backend and ships in ``overlay_control.stats`` for the
      spectator page and the set-summary recap.
    -->

    <script>
        const OUTPUT_KEY = "{{ output_key }}";
        window.OVERLAY_STYLE = "{{ style }}";
        window.OVERLAY_LOCALE = "{{ locale|default('en') }}";
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/${OUTPUT_KEY}`;
    </script>
    <script src="/static/js/set_summary.js?v={{ v }}"></script>
    <script src="/static/js/app.js?v={{ v }}"></script>
</body>
</html>
