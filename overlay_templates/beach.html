{% extends "base.html" %}

{% block head_meta %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
{% endblock %}

{% block title %}Beach Volleyball Overlay - {{ target_id }}{% endblock %}

{% block head_css %}
    <link rel="stylesheet" href="/static/css/beach.css?v={{ v }}">
{% endblock %}

{% block body_content %}
    <div id="scoreboard-container" class="scoreboard">
        <!-- Left team (home) — logo on the exterior, score toward the centre. -->
        <div class="team team-home">
            <div class="logo-container">
                <img class="team-logo" id="home-logo" src="" alt="" onerror="this.style.display='none'">
            </div>
            <div class="name-bar">
                <div class="team-name" id="home-name">HOME</div>
                <div class="team-meta">
                    <div class="sets-badge" id="home-sets">0</div>
                    <div class="timeout-container" id="home-timeouts">
                        <div class="timeout-dot"></div>
                        <div class="timeout-dot"></div>
                    </div>
                </div>
            </div>
            <div class="serving-indicator" id="home-serving"></div>
        </div>

        <!-- Centre: current set score — two tall, raised white cards. -->
        <div class="score-block">
            <div class="score-card score-home">
                <div class="points" id="home-points">0</div>
            </div>
            <div class="score-card score-away">
                <div class="points" id="away-points">0</div>
            </div>
        </div>

        <!-- Right team (away) — mirrored: score toward the centre, logo exterior. -->
        <div class="team team-away">
            <div class="serving-indicator" id="away-serving"></div>
            <div class="name-bar">
                <div class="team-name" id="away-name">AWAY</div>
                <div class="team-meta">
                    <div class="sets-badge" id="away-sets">0</div>
                    <div class="timeout-container" id="away-timeouts">
                        <div class="timeout-dot"></div>
                        <div class="timeout-dot"></div>
                    </div>
                </div>
            </div>
            <div class="logo-container">
                <img class="team-logo" id="away-logo" src="" alt="" onerror="this.style.display='none'">
            </div>
        </div>
    </div>
{% endblock %}
