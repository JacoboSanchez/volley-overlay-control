{% extends "base.html" %}

{% block head_css %}
    <link rel="stylesheet" href="/static/css/shield.css?v={{ v }}">
{% endblock %}

{% block body_content %}
    <div id="scoreboard-container" class="scoreboard">

        <!-- Team Home -->
        <div class="team team-home">
            <div class="logo-container">
                <img class="team-logo" id="home-logo" src="" alt="" onerror="this.style.display='none'">
            </div>
            <div class="team-info">
                <div class="team-name" id="home-name">HOME</div>
                <div class="sub-line">
                    <div class="serving-indicator" id="home-serving"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M12 2C12 2 12 12 12 22" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M2 12C2 12 12 12 22 12" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M4.5 4.5C4.5 4.5 12 8 19.5 4.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M4.5 19.5C4.5 19.5 12 16 19.5 19.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
                    <div class="timeout-container" id="home-timeouts">
                        <div class="timeout-dot"></div>
                        <div class="timeout-dot"></div>
                    </div>
                </div>
            </div>
            <div class="set-history-container" id="home-history"></div>
            <div class="sets" id="home-sets">0</div>
            <div class="points-container">
                <div class="points" id="home-points">0</div>
            </div>
        </div>

        <!-- Team Away -->
        <div class="team team-away">
            <div class="logo-container">
                <img class="team-logo" id="away-logo" src="" alt="" onerror="this.style.display='none'">
            </div>
            <div class="team-info">
                <div class="team-name" id="away-name">AWAY</div>
                <div class="sub-line">
                    <div class="serving-indicator" id="away-serving"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M12 2C12 2 12 12 12 22" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M2 12C2 12 12 12 22 12" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M4.5 4.5C4.5 4.5 12 8 19.5 4.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M4.5 19.5C4.5 19.5 12 16 19.5 19.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
                    <div class="timeout-container" id="away-timeouts">
                        <div class="timeout-dot"></div>
                        <div class="timeout-dot"></div>
                    </div>
                </div>
            </div>
            <div class="set-history-container" id="away-history"></div>
            <div class="sets" id="away-sets">0</div>
            <div class="points-container">
                <div class="points" id="away-points">0</div>
            </div>
        </div>

    </div>
{% endblock %}
