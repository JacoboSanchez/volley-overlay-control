{% extends "base.html" %}

{% block head_css %}
    <link rel="stylesheet" href="/static/css/neon.css?v={{ v }}">
{% endblock %}

{% block body_content %}
    <div id="scoreboard-container" class="scoreboard">

        <!-- Header: localized set label + per-set history chips -->
        <div class="head">
            <span id="current-set-label">SET 1</span>
            <div class="head-history">
                <div class="set-history-container" id="home-history"></div>
                <div class="history-sep"></div>
                <div class="set-history-container" id="away-history"></div>
            </div>
        </div>

        <!-- Team Home -->
        <div class="team team-home">
            <div class="team-id">
                <div class="logo-container">
                    <img class="team-logo" id="home-logo" src="" alt="" onerror="this.style.display='none'">
                </div>
                <div class="team-name" id="home-name">HOME</div>
                <div class="serving-indicator" id="home-serving"></div>
            </div>
            <div class="timeout-container" id="home-timeouts">
                <div class="timeout-dot"></div>
                <div class="timeout-dot"></div>
            </div>
            <div class="sets" id="home-sets">0</div>
            <div class="points-container">
                <div class="points" id="home-points">0</div>
            </div>
        </div>

        <!-- Team Away -->
        <div class="team team-away">
            <div class="team-id">
                <div class="logo-container">
                    <img class="team-logo" id="away-logo" src="" alt="" onerror="this.style.display='none'">
                </div>
                <div class="team-name" id="away-name">AWAY</div>
                <div class="serving-indicator" id="away-serving"></div>
            </div>
            <div class="timeout-container" id="away-timeouts">
                <div class="timeout-dot"></div>
                <div class="timeout-dot"></div>
            </div>
            <div class="sets" id="away-sets">0</div>
            <div class="points-container">
                <div class="points" id="away-points">0</div>
            </div>
        </div>

    </div>
{% endblock %}
