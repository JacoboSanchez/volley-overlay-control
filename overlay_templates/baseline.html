{% extends "base.html" %}

{% block head_css %}
    <link rel="stylesheet" href="/static/css/baseline.css?v={{ v }}">
{% endblock %}

{% block body_content %}
    <div id="scoreboard-container" class="scoreboard">

        <!-- Team Home (left wing) -->
        <div class="team team-home">
            <div class="logo-container">
                <img class="team-logo" id="home-logo" alt="" onerror="this.style.display='none'">
            </div>
            <div class="team-info">
                <div class="team-name" id="home-name">HOME</div>
                <div class="team-meta">
                    <div class="set-history-container" id="home-history"></div>
                    <div class="timeout-container" id="home-timeouts">
                        <div class="timeout-dot"></div>
                        <div class="timeout-dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Home points -->
        <div class="points-block home">
            <div class="points-container">
                <div class="points" id="home-points">0</div>
            </div>
            <div class="serving-indicator" id="home-serving"></div>
        </div>

        <!-- Centre: localized set label + sets won -->
        <div class="centre">
            <div class="set-label" id="current-set-label">SET 1</div>
            <div class="sets-row">
                <span class="sets home" id="home-sets">0</span>
                <span class="sets-sep">–</span>
                <span class="sets away" id="away-sets">0</span>
            </div>
        </div>

        <!-- Away points -->
        <div class="points-block away">
            <div class="points-container">
                <div class="points" id="away-points">0</div>
            </div>
            <div class="serving-indicator" id="away-serving"></div>
        </div>

        <!-- Team Away (right wing) -->
        <div class="team team-away">
            <div class="logo-container">
                <img class="team-logo" id="away-logo" alt="" onerror="this.style.display='none'">
            </div>
            <div class="team-info">
                <div class="team-name" id="away-name">AWAY</div>
                <div class="team-meta">
                    <div class="set-history-container" id="away-history"></div>
                    <div class="timeout-container" id="away-timeouts">
                        <div class="timeout-dot"></div>
                        <div class="timeout-dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress toward the current set's point target
             (filled by renderSetProgress in app.js) -->
        <div class="progress-row">
            <div class="set-progress home" id="home-set-progress"><i></i></div>
            <div class="progress-gap"></div>
            <div class="set-progress away" id="away-set-progress"><i></i></div>
        </div>

    </div>
{% endblock %}
