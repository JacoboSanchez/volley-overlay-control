{% extends "base.html" %}

{% block title %}Corner Gradient Overlay — {{ target_id }}{% endblock %}

{% block head_css %}
    <link rel="stylesheet" href="/static/css/corner_gradient.css?v={{ v }}">
{% endblock %}

{% block body_content %}
    <div id="scoreboard-container" class="scoreboard corners corners-gradient" data-fixed-geometry>

        <!-- Team Home (left corner) -->
        <div class="corner-chip pylon-home team-home">
            <div class="chip-ext">
                <div class="ident">
                    <div class="logo-container">
                        <img class="team-logo" id="home-logo" alt="" onerror="this.style.display='none'">
                    </div>
                    <div class="serving-indicator" id="home-serving"></div>
                </div>
                <div class="timeout-container" id="home-timeouts">
                    <div class="timeout-dot"></div>
                    <div class="timeout-dot"></div>
                </div>
            </div>
            <div class="team-info">
                <div class="team-name" id="home-name">HOME</div>
            </div>
            <div class="chip-int">
                <div class="set-pips" id="home-set-pips"></div>
                <div class="points-container">
                    <div class="points" id="home-points">0</div>
                </div>
            </div>
        </div>

        <!-- Team Away (right corner) -->
        <div class="corner-chip pylon-away team-away">
            <div class="chip-ext">
                <div class="ident">
                    <div class="logo-container">
                        <img class="team-logo" id="away-logo" alt="" onerror="this.style.display='none'">
                    </div>
                    <div class="serving-indicator" id="away-serving"></div>
                </div>
                <div class="timeout-container" id="away-timeouts">
                    <div class="timeout-dot"></div>
                    <div class="timeout-dot"></div>
                </div>
            </div>
            <div class="team-info">
                <div class="team-name" id="away-name">AWAY</div>
            </div>
            <div class="chip-int">
                <div class="set-pips" id="away-set-pips"></div>
                <div class="points-container">
                    <div class="points" id="away-points">0</div>
                </div>
            </div>
        </div>

    </div>
{% endblock %}
