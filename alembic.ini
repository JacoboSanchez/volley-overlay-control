# Alembic configuration for the multi-user DB layer.
#
# ``sqlalchemy.url`` is intentionally NOT set here: migrations/env.py resolves
# the URL from ``DATABASE_URL`` (via app.db.engine.database_url) so the CLI,
# the startup auto-migrate, and the app all agree on the target database.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use OS-native path separators for version files / sys.path entries.
path_separator = os
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
